<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GST TCUV CRM v9</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --red:#C8102E;--red-lt:rgba(200,16,46,.07);--red-dk:#a30e26;
  --gold:#8A6200;--gold-lt:rgba(138,98,0,.08);
  --green:#0A7C3A;--green-lt:rgba(10,124,58,.08);
  --blue:#1558B0;--blue-lt:rgba(21,88,176,.08);
  --purple:#5B21B6;--purple-lt:rgba(91,33,182,.08);
  --orange:#C2410C;--orange-lt:rgba(194,65,12,.08);
  --teal:#0E7490;--teal-lt:rgba(14,116,144,.08);
  --bg:#ECEEF2;--surface:#F5F6F8;--card:#fff;
  --bdr:#D4D8E1;--bdr-dk:#B8BEC9;
  --txt:#0A0E17;--dim:#3A4252;--dim-m:#5C6475;--dim-lt:#8E95A3;
  --hdr:#0A0E17;
  --sh:0 1px 4px rgba(0,0,0,.09),0 1px 2px rgba(0,0,0,.06);
  --sh-md:0 4px 18px rgba(0,0,0,.11),0 2px 6px rgba(0,0,0,.06);
  --sh-lg:0 12px 40px rgba(0,0,0,.14);
  --r:10px;--rl:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;min-height:100vh}

/* ─── HEADER ─── */
.hdr{background:var(--hdr);height:64px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:400;box-shadow:0 2px 20px rgba(0,0,0,.45)}
.hdr-l{display:flex;align-items:center;gap:16px}
.logo{background:var(--red);border-radius:7px;padding:5px 15px;font-family:'Orbitron',sans-serif;font-weight:900;color:#fff;font-size:20px;letter-spacing:4px;box-shadow:0 2px 14px rgba(200,16,46,.55);line-height:1.4;flex-shrink:0}
.hdr-vr{width:1px;height:28px;background:rgba(255,255,255,.18)}
.hdr-brand .t{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2.5px;color:#fff;text-transform:uppercase}
.hdr-brand .s{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
.hdr-badge{background:var(--red);color:#fff;border-radius:20px;font-size:10px;font-weight:800;padding:3px 11px;letter-spacing:.8px;font-family:'Orbitron',sans-serif}
.hdr-r{display:flex;align-items:center;gap:10px}
.ds-sel{padding:7px 14px;border-radius:7px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);color:#fff;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;min-width:230px;outline:none;cursor:pointer}
.ds-sel option{background:#1a2035;color:#fff}
.btn-hdr{padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.85);font-weight:600;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.btn-hdr:hover{background:rgba(255,255,255,.12);color:#fff}

/* ─── NAV ─── */
.nav{background:#fff;border-bottom:2px solid var(--bdr);padding:0 28px;display:flex;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{padding:14px 18px;border:none;border-bottom:3px solid transparent;background:none;color:var(--dim-m);font-weight:600;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;transition:color .15s,border-color .15s;margin-bottom:-2px}
.nav button:hover{color:var(--txt)}
.nav button.active{color:var(--red);border-bottom-color:var(--red);font-weight:700}

/* ─── LAYOUT ─── */
.pg{max-width:1440px;margin:0 auto;padding:26px 28px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}

/* ─── CARDS ─── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:20px;box-shadow:var(--sh)}
.card-title{font-size:11px;color:var(--dim-m);font-weight:700;text-transform:uppercase;letter-spacing:1.4px;margin-bottom:14px;font-family:'Inter',sans-serif}
.card+.card{margin-top:14px}

/* ─── PAGE HEADER ─── */
.pg-hdr{margin-bottom:22px}
.pg-ttl{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:800;color:var(--txt);letter-spacing:.3px}
.pg-sub{font-size:13px;color:var(--dim-m);margin-top:4px}
.pg-rule{height:3px;background:linear-gradient(90deg,var(--red) 0%,transparent 100%);border-radius:2px;margin-top:10px;width:60px}

/* ─── KPI STRIP ─── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--bdr);border-radius:var(--rl);padding:18px 20px;border-left:4px solid var(--kc,var(--blue));box-shadow:var(--sh);transition:box-shadow .2s,transform .15s;overflow:hidden;position:relative}
.kpi::after{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:var(--kc,var(--blue));opacity:.04;pointer-events:none}
.kpi:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.kpi-lbl{font-size:11px;color:var(--dim-m);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:8px}
.kpi-val{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:800;color:var(--kc,var(--blue));line-height:1.1}
.kpi-sub{font-size:12px;color:var(--dim-m);margin-top:6px;font-weight:500}

/* ─── SECTION HDR ─── */
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.sec-dot{width:10px;height:10px;border-radius:50%;background:var(--red);flex-shrink:0;box-shadow:0 0 0 3px var(--red-lt)}
.sec-ttl{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;color:var(--txt)}
.sec-sub{font-size:13px;color:var(--dim-m);margin-top:1px}

/* ─── FORMS ─── */
.fl{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;display:block}
.fi{padding:9px 12px;border-radius:8px;border:1.5px solid var(--bdr);background:#fff;color:var(--txt);font-size:14px;font-family:'Inter',sans-serif;outline:none;width:100%;transition:border-color .15s,box-shadow .15s;font-weight:500}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,88,176,.1)}
.fi::placeholder{color:var(--dim-lt);font-weight:400}
.fi-sm{padding:5px 6px;font-size:11px;text-align:center}
.fi-ta{padding:9px 12px;border-radius:8px;border:1.5px solid var(--bdr);background:#fff;color:var(--txt);font-size:14px;font-family:'Inter',sans-serif;outline:none;width:100%;resize:vertical;line-height:1.6;font-weight:400}
.fi-ta:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,88,176,.1)}
select.fi{cursor:pointer}

/* ─── BUTTONS ─── */
.btn{padding:9px 20px;border-radius:8px;border:none;background:var(--red);color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s,box-shadow .15s,transform .1s;box-shadow:0 2px 8px rgba(200,16,46,.3);display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--red-dk);box-shadow:0 4px 14px rgba(200,16,46,.42);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-blue{background:var(--blue);box-shadow:0 2px 8px rgba(21,88,176,.3)}
.btn-blue:hover{background:#124a9a;box-shadow:0 4px 14px rgba(21,88,176,.42)}
.btn-green{background:var(--green);box-shadow:0 2px 8px rgba(10,124,58,.3)}
.btn-ghost{background:#fff;border:1.5px solid var(--bdr);color:var(--dim);box-shadow:none}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-del{background:var(--red-lt);border:1.5px solid rgba(200,16,46,.25);color:var(--red);box-shadow:none;font-weight:700}
.btn-del:hover{background:var(--red);color:#fff;box-shadow:0 2px 8px rgba(200,16,46,.35)}
.btn-edit{background:var(--bg);border:1.5px solid var(--bdr);color:var(--dim);box-shadow:none}
.btn-edit:hover{border-color:var(--blue);color:var(--blue)}
.btn-purple{background:var(--purple);box-shadow:0 2px 8px rgba(91,33,182,.3)}
.btn-purple:hover{background:#4c1a9e;box-shadow:0 4px 14px rgba(91,33,182,.42)}

/* ─── TABLES ─── */
table{width:100%;border-collapse:collapse}
th{padding:10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--dim-m);border-bottom:2px solid var(--bdr);white-space:nowrap;font-family:'Inter',sans-serif}
td{padding:11px 10px;font-size:13px;border-bottom:1px solid var(--bdr);color:var(--txt);font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(21,88,176,.025)}
th.r,td.r{text-align:right}
th.c,td.c{text-align:center}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;border-radius:20px;font-size:11px;font-weight:700;padding:3px 10px;letter-spacing:.4px;text-transform:uppercase;font-family:'Inter',sans-serif}
.pill-red{background:var(--red-lt);color:var(--red);border:1px solid rgba(200,16,46,.2)}
.pill-green{background:var(--green-lt);color:var(--green);border:1px solid rgba(10,124,58,.2)}
.pill-blue{background:var(--blue-lt);color:var(--blue);border:1px solid rgba(21,88,176,.2)}
.pill-gold{background:var(--gold-lt);color:var(--gold);border:1px solid rgba(138,98,0,.2)}
.pill-purple{background:var(--purple-lt);color:var(--purple);border:1px solid rgba(91,33,182,.2)}
.pill-orange{background:var(--orange-lt);color:var(--orange);border:1px solid rgba(194,65,12,.2)}
.pill-teal{background:var(--teal-lt);color:var(--teal);border:1px solid rgba(14,116,144,.2)}
.pill-gray{background:var(--bg);color:var(--dim);border:1px solid var(--bdr)}

/* ─── PIPELINE ─── */
.pipeline{display:grid;gap:10px}
.pipe-col{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--r);padding:12px;min-height:140px}
.pipe-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.pipe-card{background:#fff;border:1px solid var(--bdr);border-radius:8px;padding:11px 12px;margin-bottom:7px;cursor:pointer;transition:box-shadow .15s,transform .1s,border-color .15s;box-shadow:var(--sh)}
.pipe-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px);border-color:var(--bdr-dk)}
.pipe-card-name{font-weight:600;font-size:13px;color:var(--txt);margin-bottom:3px;line-height:1.3}
.pipe-card-meta{font-size:11px;color:var(--dim-m)}
.pipe-count{border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700}
.pipe-add{width:100%;background:none;border:1.5px dashed var(--bdr-dk);border-radius:7px;padding:8px;color:var(--dim-lt);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:all .15s;margin-top:6px}
.pipe-add:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-lt)}

/* ─── TASKS ─── */
.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--bdr)}
.task-item:last-child{border-bottom:none}
.task-cb{width:18px;height:18px;border-radius:5px;border:2px solid var(--bdr-dk);cursor:pointer;flex-shrink:0;margin-top:2px;appearance:none;transition:all .15s}
.task-cb:checked{background:var(--green);border-color:var(--green)}
.task-text{flex:1;font-size:14px;color:var(--txt);line-height:1.45;font-weight:500}
.task-text.done{text-decoration:line-through;color:var(--dim-lt)}
.task-due{font-size:11px;font-weight:700}
.task-due.overdue{color:var(--red)}
.task-due.soon{color:var(--orange)}
.task-due.ok{color:var(--green)}

/* ─── ACTIVITY ─── */
.act-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--bdr)}
.act-item:last-child{border-bottom:none}
.act-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.act-body{flex:1}
.act-txt{font-size:13px;color:var(--txt);line-height:1.4;font-weight:500}
.act-time{font-size:11px;color:var(--dim-m);margin-top:3px}

/* ─── SCORE ─── */
.score-bar{height:8px;border-radius:4px;background:var(--bdr);overflow:hidden;margin:6px 0}
.score-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.score-grade{font-family:'Orbitron',sans-serif;font-size:44px;font-weight:900;line-height:1}

/* ─── STATUS ─── */
.st-on{background:var(--green-lt);border:1.5px solid rgba(10,124,58,.25);color:var(--green);border-radius:8px;text-align:center;padding:10px;font-size:13px;font-weight:700}
.st-close{background:var(--gold-lt);border:1.5px solid rgba(138,98,0,.25);color:var(--gold);border-radius:8px;text-align:center;padding:10px;font-size:13px;font-weight:700}
.st-low{background:var(--red-lt);border:1.5px solid rgba(200,16,46,.25);color:var(--red);border-radius:8px;text-align:center;padding:10px;font-size:13px;font-weight:700}

/* ─── UPLOAD ─── */
.dp{border:2px dashed var(--bdr-dk);border-radius:var(--rl);padding:26px 16px;text-align:center;cursor:pointer;background:#fafbfc;transition:all .2s}
.dp:hover{border-color:var(--blue);background:var(--blue-lt)}
.dp.over{border-color:var(--red);background:var(--red-lt)}
.dp.done{border-color:var(--green);background:var(--green-lt)}
.dp-ico{font-size:30px;margin-bottom:8px;opacity:.65;display:block}
.dp h3{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:4px}
.dp p{font-size:12px;color:var(--dim-m)}
.dp .ok{color:var(--green);font-weight:700;font-size:13px;margin-top:6px}

/* ─── CONTACTS ─── */
.ct-card{background:#fff;border:1px solid var(--bdr);border-radius:var(--rl);padding:16px 18px;margin-bottom:10px;box-shadow:var(--sh);transition:box-shadow .15s,transform .1s}
.ct-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.ct-av{width:42px;height:42px;border-radius:50%;background:var(--red-lt);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:var(--red);flex-shrink:0;font-family:'Orbitron',sans-serif}
.ct-name{font-weight:700;font-size:15px;color:var(--txt)}
.ct-role{font-size:12px;color:var(--dim-m);margin-top:2px}
.ct-det{font-size:12px;color:var(--dim-m);margin-top:3px}
.ct-det a{color:var(--blue);text-decoration:none}

/* ─── HISTORY ─── */
.hist-item{padding:14px 16px;background:#fff;border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh)}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px;flex-wrap:wrap}
.hist-name{font-weight:700;font-size:14px;color:var(--txt)}
.hist-note{font-size:13px;color:var(--dim);line-height:1.6}

/* ─── TIP BANNERS ─── */
.tip{padding:11px 15px;border-radius:9px;font-size:13px;font-weight:500;line-height:1.5}
.tip-blue{background:var(--blue-lt);border:1px solid rgba(21,88,176,.2);color:var(--blue)}
.tip-green{background:var(--green-lt);border:1px solid rgba(10,124,58,.2);color:var(--green)}
.tip-red{background:var(--red-lt);border:1px solid rgba(200,16,46,.2);color:var(--red)}
.tip-purple{background:var(--purple-lt);border:1px solid rgba(91,33,182,.2);color:var(--purple)}
.tip-gold{background:var(--gold-lt);border:1px solid rgba(138,98,0,.2);color:var(--gold)}

/* ─── EMAIL ─── */
.email-area{width:100%;min-height:260px;padding:14px;border:1.5px solid var(--bdr);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;color:var(--txt);resize:vertical;line-height:1.65}
.email-area:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,88,176,.1)}

/* ─── CHART WRAPPER ─── */
.cw{position:relative;width:100%}
canvas{display:block}

/* ─── FOOTER ─── */
footer{text-align:center;padding:16px 28px;border-top:2px solid var(--bdr);background:#fff;font-size:12px;color:var(--dim-m)}

/* ─── PRINT ─── */
@media print{.nav,.btn,.btn-hdr,.ds-sel,.dp,.fi-ta,.hdr-r,.pipe-add{display:none!important}.pg{padding:4px}.card,.kpi{box-shadow:none!important}}
</style>
</head>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay" style="position:fixed;inset:0;background:#0A0E17;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif">
  <div style="background:#fff;padding:40px;border-radius:14px;width:380px;max-width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="text-align:center;margin-bottom:24px">
      <div style="background:#C8102E;color:#fff;display:inline-block;padding:8px 18px;border-radius:8px;font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:4px;font-size:22px">GST</div>
      <div style="margin-top:12px;font-weight:700;font-size:18px;color:#0A0E17">TCUV Dashboard</div>
      <div style="font-size:12px;color:#5C6475;margin-top:4px" id="loginMode">Sign in to your account</div>
    </div>
    <input id="loginEmail" type="email" placeholder="Email" style="width:100%;padding:12px;border:1px solid #D4D8E1;border-radius:8px;font-size:14px;margin-bottom:10px;outline:none">
    <input id="loginPass" type="password" placeholder="Password" style="width:100%;padding:12px;border:1px solid #D4D8E1;border-radius:8px;font-size:14px;margin-bottom:14px;outline:none">
    <button onclick="doLogin()" id="loginBtn" style="width:100%;padding:12px;background:#C8102E;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:10px">Sign In</button>
    <button onclick="toggleSignup()" style="width:100%;padding:10px;background:transparent;color:#3A4252;border:1px solid #D4D8E1;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer">Create new account</button>
    <div id="loginErr" style="color:#C8102E;font-size:12px;margin-top:12px;text-align:center;min-height:16px"></div>
  </div>
</div>

<div class="hdr">
  <div class="hdr-l">
    <div class="logo">GST</div>
    <div class="hdr-vr"></div>
    <div class="hdr-brand">
      <div class="t">Gulf States Toyota &nbsp;·&nbsp; TCUV Performance CRM</div>
      <div class="s">Certified Used Vehicle District Management System</div>
    </div>
    <span class="hdr-badge">v9</span>
  </div>
  <div class="hdr-r">
    <button class="btn-hdr" onclick="window.print()">⬡ Print</button>
    <div class="hdr-vr"></div>
    <select class="ds-sel" id="dealerSel" onchange="pickDealer(this.value)"></select>
    <div class="hdr-vr"></div>
    <button class="btn-hdr" onclick="doLogout()" title="Sign out">Sign Out</button>
  </div>
</div>

<div class="nav" id="navBar"></div>
<div class="pg" id="mainContent"></div>

// ═══ DEALER SCORE ═════════════════════════════════════════════
function dealerScore(c){
  const f=c.fn||{},tu=Math.max(f.tu||1,1);
  const aF=Math.round(f.tg/tu),gF=Math.round(f.dTG||f.gTG||0);
  const aB=Math.round(f.tFI/tu),gB=Math.round(f.dTF||f.gTF||0);
  const aR=Math.round((f.cR||0)/tu),gR=Math.round(f.dCR||f.gCR||0);
  const rc=c.rc?.ds?.find(d=>nm(d.n,c.nm));
  const att=rc&&rc.o>0?rc.p:100;

  // Scoring breakdown  -  each component visible to user
  const s_att=Math.round(Math.min(att/100,1.2)*25);         // 0-25: Obj attainment
  const s_front=gF>0?Math.round(aF>=gF?20:Math.max(0,aF/gF*20)):0; // 0-20: Front vs GST
  const s_back=gB>0?Math.round(aB>=gB?20:Math.max(0,aB/gB*20)):0;  // 0-20: Back vs GST
  const s_recon=gR>0?Math.round(aR<=gR?15:Math.max(0,gR/aR*15)):0; // 0-15: Recon vs GST
  const s_ct=Math.min((c.contacts||[]).length*3,10);                  // 0-10: Contacts
  const s_ch=Math.min((c.consultHistory||[]).length*2,10);            // 0-10: Consultations

  const max=(gF>0?20:0)+(gB>0?20:0)+(gR>0?15:0)+25+10+10;
  const raw=s_att+s_front+s_back+s_recon+s_ct+s_ch;
  const p=max>0?Math.round(raw/max*100):0;
  const grade=p>=90?'A+':p>=80?'A':p>=70?'B+':p>=60?'B':p>=50?'C':'D';
  const color=p>=80?GN:p>=60?GD:RE;
  return{score:p,grade,color,
    breakdown:[
      {lbl:'Obj Attainment',pts:s_att,max:25,pct:att+'%'},
      {lbl:'Front GP vs GST',pts:s_front,max:20,pct:f$(aF)+' vs '+f$(gF)},
      {lbl:'Back End vs GST',pts:s_back,max:20,pct:f$(aB)+' vs '+f$(gB)},
      {lbl:'Recon vs GST',pts:s_recon,max:15,pct:f$(aR)+' vs '+f$(gR)+' gst'},
      {lbl:'Contact Coverage',pts:s_ct,max:10,pct:(c.contacts||[]).length+' contacts'},
      {lbl:'Consultation Log',pts:s_ch,max:10,pct:(c.consultHistory||[]).length+' visits logged'},
    ]};
}

// ═══ SVG GAUGES ═══════════════════════════════════════════════
function svgGauge(val,max,lbl,target){
  const p=Math.min((val||0)/max,1),r=52,cx=80,cy=70;
  const ang=Math.PI+p*Math.PI,x2=cx+r*Math.cos(ang),y2=cy+r*Math.sin(ang),lg=p>0.5?1:0;
  const col=(val||0)>=(target||1)?GN:(val||0)>=(target||1)*0.8?GD:RE;
  const arc=p>0?`<path d="M${cx-r} ${cy} A${r} ${r} 0 ${lg} 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="11" stroke-linecap="round"/>`:''
  const tP=Math.min((target||1)/max,1),tAng=Math.PI+tP*Math.PI,tx=cx+r*Math.cos(tAng),ty=cy+r*Math.sin(tAng);
  return`<svg viewBox="0 0 160 90" style="width:100%;max-width:180px">
    <path d="M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="${DK}" stroke-width="11" stroke-linecap="round"/>
    ${arc}
    <circle cx="${tx}" cy="${ty}" r="5" fill="${BL}" opacity="0.8"/>
    <text x="${cx}" y="${cy-4}" text-anchor="middle" fill="${col}" font-size="18" font-weight="800" font-family="Orbitron">${(val||0).toFixed(2)}</text>
    <text x="${cx}" y="${cy+13}" text-anchor="middle" fill="${DM}" font-size="9" font-family="Inter">${lbl}</text>
  </svg>`;}
function svgPctGauge(val,target,lbl,range){
  const p=Math.min(val/100,1),tP=Math.min(target/100,1),r=48,cx=80,cy=68;
  const ang=a=>Math.PI+a*Math.PI,pt=a=>({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)});
  const p0=pt(ang(0)),p1=pt(ang(p)),pT=pt(ang(tP));
  const col=val>=target?GN:val>=target*0.75?GD:RE;
  // large-arc-flag is always 0  -  the gauge is a semicircle (max 180°), never needs the long arc
  const arc=p>0&&p<1?`<path d="M${p0.x} ${p0.y} A${r} ${r} 0 0 1 ${p1.x} ${p1.y}" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round"/>`
    :p>=1?`<path d="M${p0.x} ${p0.y} A${r} ${r} 0 0 1 ${cx+r-0.01} ${cy}" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round"/>`:''
  return`<svg viewBox="0 0 160 85" style="width:100%;max-width:220px"><path d="M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="${DK}" stroke-width="12" stroke-linecap="round"/>${arc}<circle cx="${pT.x}" cy="${pT.y}" r="5" fill="${BL}"/><text x="${cx}" y="${cy-5}" text-anchor="middle" fill="${col}" font-size="21" font-weight="900" font-family="Orbitron">${val}%</text><text x="${cx}" y="${cy+14}" text-anchor="middle" fill="${DM}" font-size="9" font-family="Inter">${lbl}</text></svg>`;}

function addTask(){const c=gc();if(!c)return;const txt=document.getElementById('tkTxt')?.value.trim();if(!txt)return;if(!c.tasks)c.tasks=[];c.tasks.push({id:Date.now(),text:txt,due:document.getElementById('tkDue')?.value||'',priority:document.getElementById('tkPri')?.value||'medium',assignee:document.getElementById('tkAsgn')?.value||'Self',done:false});render();saveAll();}
function toggleTask(id,v){const c=gc();if(!c)return;const t=(c.tasks||[]).find(t=>t.id===id);if(t){t.done=v;render();saveAll();}}
function delTask(id){const c=gc();if(!c)return;c.tasks=(c.tasks||[]).filter(t=>t.id!==id);render();saveAll();}

// Pipeline
function addPL(){const c=gc();if(!c)return;const n=prompt('Initiative name:');if(!n)return;const s=prompt('Stage (Planning/In Progress/Completed/Stalled/On Hold):','Planning')||'Planning';const nt=prompt('Notes:','')||'';const dt=prompt('Target date:',td())||td();if(!c.pipeline)c.pipeline=[];c.pipeline.push({id:Date.now(),name:n,stage:s,notes:nt,date:dt});render();saveAll();}
function addPLS(s){const c=gc();if(!c)return;const n=prompt('Initiative name:');if(!n)return;const nt=prompt('Notes:','')||'';const dt=prompt('Target date:',td())||td();if(!c.pipeline)c.pipeline=[];c.pipeline.push({id:Date.now(),name:n,stage:s,notes:nt,date:dt});render();saveAll();}
function editPL(id){const c=gc();if(!c)return;const it=(c.pipeline||[]).find(p=>p.id===id);if(!it)return;const ss=['Planning','In Progress','Completed','Stalled','On Hold'];const ns=prompt('Stage:\n'+ss.join(' / '),it.stage);if(ns&&ss.includes(ns))it.stage=ns;const nn=prompt('Notes:',it.notes||'');if(nn!==null)it.notes=nn;render();saveAll();}

  const nuR=f.usedNewRatio||0;
  const gstNuR=f.gstUsedNewRatio||0;

  // ── Period math: tu is a MONTHLY AVERAGE. Compute how many months in the period.
  const pr=f.pr||'';
  const moMap={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  const pmatch=pr.toLowerCase().match(/(\w{3})\w*\s+\d{4}.*?(?:to|-|-)\s*(\w{3})\w*\s+\d{4}/);
  const numMo=pmatch?(moMap[pmatch[2]]||1)-(moMap[pmatch[1]]||1)+1:1;
  const periodTotal=Math.round(f.tu*numMo);  // TOTAL units this period

  // ── Prior Year: stored as same-period total (user enters total for the matching period)
  const pyTotal=f.pyTCUV||0;                   // PY total for full year
  const pyMonthly=pyTotal>0?pyTotal/12:0;       // PY monthly avg (full year)
  // Current monthly avg = CY period total (user-entered) divided by number of months in the period
  const cyMonthly=f.cyPeriod>0?f.cyPeriod/numMo:f.tu;

  // ── Growth goal: full year, manual growth % (default 20%), stored per dealer
  const growthPct=f.growthPct||20;  // manual input, default 20%
  const goal=pyTotal>0?Math.round(pyTotal*(1+growthPct/100)):0;
  const goalMonthly=goal>0?Math.round(goal/12):0;  // always annualized
  // Use actual PY monthly data from yoyPrior if entered, otherwise distribute evenly
  const yp=c.yoyPrior||Array(12).fill(0);
  const hasYPData=yp.some(v=>v>0);
  // Growth goal per month = PY actual month + growth% of that month
  const moGoals=hasYPData
    ?yp.map(v=>Math.round(v*(1+growthPct/100)))
    :Array(12).fill(goalMonthly);

  const rcD=c.rc?.ds?.find(d=>nm(d.n,c.nm));

    ${kpi('Dept Total GP',f$(f.dGP),fN(f.tot||0)+' total used units',BL)}

    ${kpi('TCUV Avg Back/Unit',f$(aB),'GST: '+f$(gB),aB>=gB?GN:GD)}
    ${kpi('TCUV Total GP/Unit',f$(aT),'Front+F&I, GST: '+f$(gT),aT>=gT?GN:GD)}
    ${kpi('TCUV Avg Recon/Unit',f$(aR),'GST: '+f$(gR),aR<=gR?GN:RE)}
    ${ovN>0?kpi('Units to Target',fN(ovN),pace2+' units/day · '+dl+'d left',RE):kpi('Units to Target','On Track',rcD?'Obj met':'No recap',GN)}

        <div><label class="fl">Gold</label><input id="mtdGd" type="number" class="fi" value="${mt.gold||''}" oninput="sMTD()" placeholder="0"></div>
      </div>

  const deptGPpu=Math.round(f.dGP/totU);     // dept GP / total used = $4,642 not $4,658

  const gF=Math.round(f.dTG||f.gTG||0);
  const gB=Math.round(f.dTF||f.gTF||0);

  const ncTotalGP=ncFront+ncBack,ncTotalPU=ncU>0?Math.round(ncTotalGP/ncU):0;
  const otU=Math.round(f.ou||0),otFront=Math.round(f.og||0);

    ${kpi('Dept GP / All Used',f$(deptGPpu),f$(f.dGP)+' / '+fN(totU)+' units',BL)}
  </div>
  ${showNonTcuv&&nonTcuvUnits>0?`
  <div class="card" style="margin-bottom:14px;border-left:4px solid ${OR};position:relative" id="nonTcuvCard">

          ${kpi('Units',fN(ncU),Math.round(ncU/(totU||1)*100)+'% of total used',GD)}

  ${!showNonTcuv&&nonTcuvUnits>0?`<div style="margin-bottom:14px;text-align:right"><button class="btn btn-sm btn-ghost" onclick="toggleNonTcuvGross()">Show Non-TCUV Gross Breakdown</button></div>`:''}

          <tr><td>TCUV F&amp;I / Back-End (total)</td><td class="r" style="font-weight:700">${f$(f.tFI)}</td><td class="r" style="color:var(--dim-m)"> - </td></tr>
          <tr><td>TCUV Avg Back-End / unit</td><td class="r" style="font-weight:700;color:${aB>=gB?GN:RE}">${f$(aB)} ${aB>=gB?'▲':'▼'}</td><td class="r" style="color:var(--dim-m)">GST: ${f$(gB)}</td></tr>
          <tr><td>TCUV Recon Cost (total)</td><td class="r" style="font-weight:700">${f$(f.cR)}</td><td class="r" style="color:var(--dim-m)"> - </td></tr>
          <tr><td>TCUV Avg Recon / unit</td><td class="r" style="font-weight:700;color:${aR<=gR?GN:RE}">${f$(aR)} ${aR<=gR?'▲':'▼'}</td><td class="r" style="color:var(--dim-m)">GST: ${f$(gR)}</td></tr>

function rRecon(mc,c){

  const ms=c.moSold||Array(12).fill(0),mo=c.moObj||Array(12).fill(0);
  const yc=c.yoyCur||Array(12).fill(0),yp=c.yoyPrior||Array(12).fill(0);

  <div class="kpi-row">

    ${kpi('Objective',sel.o,sel.p+'% attainment',sel.p>=100?GN:GD)}

  </div>

  <div class="card" style="margin-bottom:14px">
    <div class="card-title">Full District Breakdown  -  ${rc.dt}</div>
    <table>
      <thead><tr><th>Dealer</th><th class="c">Silver</th><th class="c">Gold</th><th class="c">Sold</th><th class="c">Obj</th><th class="c">Attainment</th></tr></thead>

    </table>

  <div class="card" style="margin-bottom:14px">
    <div class="card-title">Monthly Objective vs Sold</div>

  </div>

  <div class="card">
    <div class="card-title">Year-Over-Year  -  Monthly TCUV Units</div>
    <div style="display:grid;grid-template-columns:repeat(12,1fr);gap:5px;margin-bottom:12px">
      ${MO.map((m,i)=>`<div><div class="fl" style="text-align:center;font-size:10px;letter-spacing:0">${m}</div><input type="number" class="fi fi-sm" style="color:${RE}" id="yoyC${i}" value="${yc[i]||''}" placeholder="Cur" oninput="sYoY()"><input type="number" class="fi fi-sm" style="margin-top:3px;color:${BL}" id="yoyP${i}" value="${yp[i]||''}" placeholder="PY" oninput="sYoY()"></div>`).join('')}
    </div>
    ${yc.some(v=>v>0)||yp.some(v=>v>0)?`<div class="cw" style="height:220px"><canvas id="yoyChart"></canvas></div>`:`<div class="tip tip-blue" style="text-align:center">Enter Current Year (Cur) and Prior Year (PY) monthly units above</div>`}

    const co=chOpts();
    mkChart('sdPie',{type:'doughnut',data:{labels:['Silver','Gold'],datasets:[{data:[sel.s||0,sel.g||0],backgroundColor:['#9CA3AF',GD],borderWidth:3,borderColor:'#fff',hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:12},padding:10,usePointStyle:true}}}}});
    // District chart: sort by units sold, show dealer names, highlight current dealer
    const distSorted=[...rc.ds].sort((a,b)=>b.t-a.t);
    const distLabels=distSorted.map(d=>d.n.length>18?d.n.slice(0,18)+'...':d.n);

    const distColors=distSorted.map(d=>nm(d.n,c.nm)?RE+'cc':'#C8D0DC');
    mkChart('sdDist',{type:'bar',data:{
      labels:distLabels,
      datasets:[
        {label:'Sold',data:distSold,backgroundColor:distColors,borderRadius:3},
        {label:'Objective',data:distObj,backgroundColor:'#E8EDF5',borderRadius:3}
      ]},options:{
        responsive:true,
        maintainAspectRatio:false,
        indexAxis:'y',
        plugins:{legend:{labels:{font:{size:11,family:"'Inter',sans-serif"},padding:10,usePointStyle:true}}},
        scales:{
          x:{ticks:{font:{size:11}},grid:{color:'rgba(0,0,0,.04)'},border:{display:false}},
          y:{ticks:{font:{size:11},autoSkip:false},grid:{display:false},border:{display:false}}
        }
      }});
    if(ms.some(v=>v>0)||mo.some(v=>v>0))mkChart('moChart',{type:'bar',data:{labels:MO,datasets:[{label:'Sold',data:ms.slice(),backgroundColor:RE+'cc',borderRadius:4},{label:'Objective',data:mo.slice(),backgroundColor:DK,borderRadius:4}]},options:co});
    if(yc.some(v=>v>0)||yp.some(v=>v>0))mkChart('yoyChart',{type:'bar',data:{labels:MO,datasets:[{label:'Current Year',data:yc.slice(),backgroundColor:RE+'cc',borderRadius:4},{label:'Prior Year',data:yp.slice(),backgroundColor:BL+'77',borderRadius:4}]},options:co});
  },160);
}

    {pct:'60-70%',desc:'of total used should be Toyota brand. Franchise lots leaning into their own brand benefit from stronger warranty support and customer loyalty.',color:BL},
    {pct:'45-60 days',desc:'supply sweet spot for certified units. Beyond 60 days the margin advantage erodes rapidly. Monitor turn rate and adjust certification pace.',color:GN}
  ];

      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:${certNeeded>0?RE:GN};margin-bottom:10px">Cert Units Needed to Hit 50% of Toyota</div>
      <div style="display:flex;align-items:baseline;gap:16px;flex-wrap:wrap">
        <div style="font-family:'Orbitron',sans-serif;font-size:48px;font-weight:900;color:${certNeeded>0?RE:GN};line-height:1">${certNeeded>0?fN(certNeeded):'0'}</div>

        </div>
      </div>
      ${certNeeded>0&&inv?`<div style="margin-top:12px;padding:10px 14px;background:rgba(255,255,255,.6);border-radius:8px;font-size:12px;color:var(--dim)">
        <strong style="color:var(--txt)">Action:</strong> You have <strong>${fN(nc)}</strong> non-certified Toyota units on the lot.
        ${nc>=certNeeded?'Sufficient non-cert Toyota inventory available to certify and reach the 50% target.':'You may need to source additional Toyota units and certify them to close the gap.'}
      </div>`:''}

    <div style="background:#fff;border:1px solid var(--bdr);border-radius:var(--rl);padding:22px 26px;box-shadow:var(--sh)">

      <div class="${cOfT>=50?'st-on':cOfT>=38?'st-close':'st-low'}">${cOfT>=50?'ON TARGET':cOfT>=38?'CLOSE':'BELOW TARGET'}<div style="font-size:11px;margin-top:3px;font-weight:400;opacity:.8">Cert % of Toyota: ${cOfT}% (Target: 50-60%)</div></div>

function perfData(c){
  const f=c.fn||{},tu=Math.max(f.tu||1,1);
  const aF=Math.round(f.tg/tu),gF=Math.round(f.dTG||f.gTG||0);
  const aB=Math.round(f.tFI/tu),gB=Math.round(f.dTF||f.gTF||0);
  const aR=Math.round((f.cR||0)/tu),gR=Math.round(f.dCR||f.gCR||0);
  const rc=c.rc?.ds?.find(d=>nm(d.n,c.nm));
  const att=rc&&rc.o>0?rc.p:0;
  const inv=c.inventory;
  const cPct=inv&&inv.a>0?Math.round(inv.c/inv.a*100):0;
  const cOfT=inv&&inv.u>0?Math.round(inv.c/inv.u*100):0;
  const tPct=inv&&inv.a>0?Math.round(inv.u/inv.a*100):0;
  const nuR=f.usedNewRatio||0;
  const areas=[];
  // Evaluate each dimension
  if(att>0&&att<100)areas.push({cat:'Objective Attainment',status:att>=90?'caution':'critical',val:att+'%',target:'100%',gap:(100-att)+'% below',detail:'Currently at '+att+'% attainment. '+(rc?'Sold '+rc.t+' of '+rc.o+' objective.':''),priority:att<80?1:2});
  if(gF>0&&aF<gF)areas.push({cat:'Front-End Gross Profit',status:aF>=gF*0.85?'caution':'critical',val:f$(aF),target:'GST: '+f$(gF),gap:f$(gF-aF)+'/unit below',detail:'Averaging '+f$(aF)+'/unit vs GST benchmark of '+f$(gF)+'/unit. Leaving '+f$(gF-aF)+' per unit on the table.',priority:aF<gF*0.75?1:2});
  if(gB>0&&aB<gB)areas.push({cat:'Back-End / F&I',status:aB>=gB*0.85?'caution':'critical',val:f$(aB),target:'GST: '+f$(gB),gap:f$(gB-aB)+'/unit below',detail:'F&I averaging '+f$(aB)+'/unit vs GST '+f$(gB)+'. Opportunity to improve VSC, GAP, and protection product penetration.',priority:aB<gB*0.75?1:2});
  if(gR>0&&aR>gR)areas.push({cat:'Reconditioning Cost',status:aR<=gR*1.2?'caution':'critical',val:f$(aR),target:'GST: '+f$(gR),gap:f$(aR-gR)+'/unit over',detail:'Recon at '+f$(aR)+'/unit vs GST '+f$(gR)+'. Over-spending '+f$(aR-gR)+' per unit. Across '+fN(tu)+' units that is '+f$((aR-gR)*tu)+' excess.',priority:aR>gR*1.5?1:2});
  if(inv&&cPct<30)areas.push({cat:'Certified Inventory Mix',status:cPct>=20?'caution':'critical',val:cPct+'%',target:'30-40%',gap:(30-cPct)+'% below floor',detail:'Only '+cPct+'% of total used inventory is certified. Target 30-40% to ensure adequate stock for objectives.',priority:cPct<15?1:3});
  if(inv&&cOfT<50)areas.push({cat:'Cert % of Toyota Brand',status:cOfT>=35?'caution':'critical',val:cOfT+'%',target:'50-60%',gap:(50-cOfT)+'% below floor',detail:'Only '+cOfT+'% of Toyota-brand used carries certification. Each non-certified Toyota is $1,000-$1,500 in missed front GP.',priority:3});
  if(nuR>0&&nuR<1.0)areas.push({cat:'Used-to-New Ratio',status:nuR>=0.8?'caution':'critical',val:nuR.toFixed(2),target:'1.00',gap:((1.0-nuR)*100).toFixed(0)+'% below target',detail:'Used-to-new ratio at '+nuR.toFixed(2)+' vs 1.00 target. Need to grow used volume relative to new.',priority:nuR<0.6?1:3});
  // Strengths
  const strengths=[];
  if(att>=100)strengths.push('Objective attainment at '+att+'% (exceeding target)');
  if(gF>0&&aF>=gF)strengths.push('Front GP at '+f$(aF)+'/unit (at or above GST '+f$(gF)+')');
  if(gB>0&&aB>=gB)strengths.push('Back-end at '+f$(aB)+'/unit (at or above GST '+f$(gB)+')');
  if(gR>0&&aR<=gR)strengths.push('Recon at '+f$(aR)+'/unit (at or below GST '+f$(gR)+')');
  if(inv&&cPct>=33)strengths.push('Certified mix at '+cPct+'% of total (on target)');
  if(nuR>=1.0)strengths.push('Used-to-new ratio at '+nuR.toFixed(2)+' (meets 1:1 target)');
  areas.sort((a,b)=>a.priority-b.priority);
  return{areas,strengths,att,aF,gF,aB,gB,aR,gR,cPct,cOfT,tPct,nuR,tu};
}

function suggestTimeline(areas){
  const critical=areas.filter(a=>a.status==='critical').length;
  const total=areas.length;
  if(critical>=3)return{weeks:8,label:'8 Weeks',desc:'Multiple critical areas require a structured 60-day improvement cadence with bi-weekly checkpoints.'};
  if(critical>=1)return{weeks:6,label:'6 Weeks',desc:'Address critical items in the first 3 weeks, then sustain and measure through the remaining period.'};
  if(total>=2)return{weeks:4,label:'4 Weeks',desc:'Focused 30-day sprint on key improvement areas with a check-in at the midpoint.'};
  return{weeks:3,label:'3 Weeks',desc:'Minor adjustments. Quick wins can be captured within a few targeted actions.'};
}

function nextVisitDate(weeks){
  const d=new Date();d.setDate(d.getDate()+weeks*7);
  return d.toISOString().slice(0,10);
}

function saveCt(){
  const c=gc();if(!c)return;
  const name=(document.getElementById('ctNm')?.value||'').trim();if(!name)return;

  const idx=parseInt(document.getElementById('ctEI')?.value||'-1');
  if(!c.contacts)c.contacts=[];
  if(idx>=0)c.contacts[idx]=ct;else c.contacts.push(ct);
  render();saveAll();
}
function editCt(i){const c=gc();if(!c||!c.contacts)return;const ct=c.contacts[i];document.getElementById('ctEI').value=i;document.getElementById('ctNm').value=ct.name||'';document.getElementById('ctTi').value=ct.title||'';document.getElementById('ctPh').value=ct.phone||'';document.getElementById('ctEm').value=ct.email||'';document.getElementById('ctPr').value=ct.priority||'medium';document.getElementById('ctNo').value=ct.notes||'';document.getElementById('ctFT').textContent='EDIT CONTACT';document.getElementById('ctCB').style.display='inline-flex';}
function cancelCt(){document.getElementById('ctEI').value='-1';document.getElementById('ctFT').textContent='ADD CONTACT';document.getElementById('ctCB').style.display='none';['ctNm','ctTi','ctPh','ctEm','ctNo'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});}
function delCt(i){const c=gc();if(!c||!c.contacts)return;if(!confirm('Remove this contact?'))return;c.contacts.splice(i,1);render();saveAll();}

function logCt(){
  const c=gc();if(!c)return;
  const notes=(document.getElementById('hNo')?.value||'').trim();
  if(!notes){alert('Please enter consultation notes before logging.');return;}
  if(!c.consultHistory)c.consultHistory=[];
  const entry={id:Date.now(),contact:(document.getElementById('hCt')?.value||'').trim(),date:document.getElementById('hDt')?.value||td(),type:document.getElementById('hTy')?.value||'Call',outcome:document.getElementById('hOu')?.value||'Neutral',notes};

async function genEmail(){
  const c=gc();if(!c)return;
  const contact=(document.getElementById('hCt')?.value||'').trim();
  const notes=(document.getElementById('hNo')?.value||'').trim();
  if(!notes){alert('Enter consultation notes first  -  the email is generated from your notes.');return;}
  const type=document.getElementById('hTy')?.value||'Visit';
  const outcome=document.getElementById('hOu')?.value||'Neutral';
  const date=document.getElementById('hDt')?.value||td();

  area.style.display='block';
  area.innerHTML=`<div class="tip tip-purple" style="text-align:center">✦ Generating AI follow-up email…</div>`;
  await _genEmail(area,c,contact,notes,type,outcome,date,'new');

async function genEmailHist(histId){

  area.style.display='block';

async function _genEmail(area,c,contact,notes,type,outcome,date,uid){
  const ctInfo=(c.contacts||[]).find(ct=>ct.name&&ct.name.toLowerCase().includes((contact||'').toLowerCase()));
  const f=c.fn||{};
  const rc=c.rc?.ds?.find(d=>nm(d.n,c.nm));
  const prompt=`You are a professional Toyota TCUV district sales consultant at Gulf States Toyota. Write a polished, specific, action-oriented follow-up email that includes performance improvement recommendations.

DEALER: ${c.nm}
CONTACT: ${contact}${ctInfo?.title?' | '+ctInfo.title:''}

CONTEXT: ${f.pr||''} \u00b7 ${f.cl||''}${rc?' \u00b7 Attainment: '+rc.p+'%':''}

PERFORMANCE DATA:
- TCUV Units: ${fN(f.tu||0)} avg/mo
- Front GP/Unit: ${f$(Math.round((f.tg||0)/Math.max(f.tu||1,1)))} (GST: ${f$(Math.round(f.dTG||f.gTG||0))})
- Back-End/Unit: ${f$(Math.round((f.tFI||0)/Math.max(f.tu||1,1)))} (GST: ${f$(Math.round(f.dTF||f.gTF||0))})

${c._lastPerfAnalysis?'\nPERFORMANCE ANALYSIS SUMMARY:\n'+c._lastPerfAnalysis.slice(0,600):''}

VISIT NOTES (base entire email on these specifics):
${notes}

FORMAT:
Subject: [specific subject line starting with "Subject: "]

[Greeting]
[Thank them + reference specific visit]
[2-3 bullet points of key discussion topics from notes]
[Performance Improvement Section: Include 2-3 specific, data-backed recommendations for areas where the dealer is underperforming vs GST benchmarks. Frame these constructively as opportunities.]
[Numbered action items: who owns what by when]
[Encouraging, specific close referencing their performance and setting expectations for the next check-in]

[Your Name]
TCUV District Sales Consultant | Gulf States Toyota
[Your Phone] | [Your Email]

Rules: under 350 words. Professional but warm. Reference specific numbers/details from notes and performance data. Include concrete improvement recommendations with target numbers. No generic filler.`;
  try{
    const resp=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5-20250929',max_tokens:1200,messages:[{role:'user',content:prompt}]})});
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    const txt=data.content?.[0]?.text||'Error generating email.';
    const lines=txt.split('\n');
    const sl=lines.find(l=>l.trim().startsWith('Subject:'));
    const subj=sl?sl.replace(/^Subject:\s*/i,'').trim():'Follow-Up: '+c.nm+' '+type+' '+date;
    const body=lines.filter(l=>!l.trim().startsWith('Subject:')).join('\n').trim();
    area.innerHTML=`
      <div style="border:1.5px solid rgba(91,33,182,.25);border-radius:12px;overflow:hidden;box-shadow:var(--sh-md)">
        <div style="background:var(--purple-lt);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(91,33,182,.15)">
          <span style="font-size:12px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:1px">✉ AI-Generated Follow-Up Email</span>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm btn-purple" onclick="copyEmail('${uid}')">Copy Email</button>
            <button class="btn btn-sm btn-ghost" onclick="this.closest('div[style*=border]').parentElement.style.display='none'">✕</button>
          </div>
        </div>
        <div style="padding:16px;background:#fff">
          <div style="margin-bottom:12px"><label class="fl">Subject Line</label><input id="eS_${uid}" class="fi" value="${subj.replace(/"/g,'&quot;')}" style="font-weight:600"></div>
          <div><label class="fl">Email Body</label><textarea id="eB_${uid}" class="email-area">${body.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea></div>
        </div>
      </div>`;
  }catch(e){const isLocal=window.location.protocol==="file:"||!window.location.hostname;area.innerHTML=isLocal?`<div class="tip tip-gold"><strong>AI features require Claude.ai:</strong> Strategic analysis and email generation use the Claude API, which is only available when running inside claude.ai. Open this dashboard through Claude to use AI features.</div>`:`<div class="tip tip-red">Error: ${e.message}. Check connection and try again.</div>`;}
}
function copyEmail(uid){
  const subj=document.getElementById('eS_'+uid)?.value||'';
  const body=document.getElementById('eB_'+uid)?.value||'';
  navigator.clipboard.writeText('Subject: '+subj+'\n\n'+body).then(()=>{
    const btn=document.querySelector(`[onclick="copyEmail('${uid}')"]`);
    if(btn){const o=btn.textContent;btn.textContent='Copied!';btn.style.background=GN;setTimeout(()=>{btn.textContent=o;btn.style.background=PR;},2200);}
  }).catch(()=>alert('Copy failed. Please select the text manually.'));
}

}

// ═══ FILE PARSING ══════════════════════════════════════════════
function drF(e,slot){e.preventDefault();document.getElementById('d'+slot).classList.remove('over');if(e.dataTransfer.files.length)parseF(e.dataTransfer.files[0],slot);}
function parseF(f,slot){
  if(!f)return;
  if(slot===3&&f.type.startsWith('image/')){const r=new FileReader();r.onload=()=>{document.getElementById('d3').classList.add('done');document.getElementById('m3').innerHTML=`<div class="ok">✓ Image loaded. Enter values manually.</div>`;};r.readAsDataURL(f);return;}
  const msg=document.getElementById('m'+slot);
  if(!window.XLSX||!window._xlsxReady){
    // Queue it  -  XLSX may still be loading
    if(msg)msg.innerHTML=`<div style="color:${BL};font-size:12px;margin-top:6px">⏳ Loading parser… retrying…</div>`;
    _xlsxQ.push([f,slot]);
    // Also try again in 2s in case onload already fired
    setTimeout(()=>{if(window.XLSX&&window._xlsxReady){const idx=_xlsxQ.findIndex(([qf,qs])=>qs===slot);if(idx>=0){const [qf,qs]=_xlsxQ.splice(idx,1)[0];_doParseF(qf,qs);}}},2000);
    return;
  }
  _doParseF(f,slot);
}
function _doParseF(f,slot){
  const msg=document.getElementById('m'+slot);
  if(!window.XLSX){if(msg)msg.innerHTML=`<div style="color:${RE};font-size:12px;margin-top:6px">⚠ Parser not loaded. Make sure you have internet access and reload the page.</div>`;return;}
  if(msg)msg.innerHTML=`<div style="color:${BL};font-size:12px;margin-top:6px">⏳ Parsing…</div>`;
  const r=new FileReader();
  r.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});const nv=v=>(typeof v==='number'?v:parseFloat(v))||0;if(slot===1)pFin(wb,nv);else if(slot===2)pDept(wb,nv);else if(slot===3)pRecap(wb,nv);}catch(err){if(msg)msg.innerHTML=`<div style="color:${RE};font-size:12px;margin-top:6px">⚠ Parse error: ${err.message}</div>`;console.error('Parse error',err);}};
  r.onerror=()=>{if(msg)msg.innerHTML=`<div style="color:${RE};font-size:12px;margin-top:6px">⚠ Could not read file.</div>`;};
  r.readAsArrayBuffer(f);
}
function pFin(wb,n){
  const msg=e=>document.getElementById('m1').innerHTML=`<div style="color:${RE};font-size:12px;margin-top:6px;font-weight:600">⚠ ${e}</div>`;
  // ── Pg1: fixed positions  -  row[1][5]=dealer name, row[3][5]=period
  const pg1=wb.Sheets['Pg1']||wb.Sheets[wb.SheetNames[0]];
  if(!pg1){msg('Pg1 not found. Sheets: '+wb.SheetNames.join(', '));return;}
  const r1=XLSX.utils.sheet_to_json(pg1,{header:1,defval:null});
  // Dealer name: row[1] col[5], fallback to row[1] cols 4-8
  let dlrNm=(r1[1]?.[5]||'').toString().trim();
  if(!dlrNm||dlrNm.toLowerCase().includes('toyota comparison')||dlrNm.toLowerCase().includes('vs')){
    for(let ci=3;ci<12;ci++){const v=(r1[1]?.[ci]||'').toString().trim();if(v&&v.length>3&&!v.toLowerCase().includes('vs')&&!v.toLowerCase().includes('gst')&&!v.toLowerCase().includes('comparison')){dlrNm=v;break;}}
  }
  // Period: row[3] col[5], clean it up  -  normalize to "Mon YYYY - Mon YYYY" or "Mon YYYY"
  const rawPeriod=(r1[3]?.[5]||'').toString().trim();
  const period=rawPeriod
    .replace(/^Dlr Avg Mth\s*/i,'')
    .replace(/\s*Current$/i,'')
    .replace(/\s*ME\b/gi,'')
    .replace(/\s+to\s+/i,' - ')
    .trim();
  if(document.getElementById('uN'))document.getElementById('uN').value=dlrNm;
  if(document.getElementById('uP'))document.getElementById('uP').value=period;

  // ── Pg6: scan by LABEL TEXT  -  works for any dealer/version
  const pg6=wb.Sheets['Pg6'];
  if(!pg6){msg('Pg6 sheet not found. Available sheets: '+wb.SheetNames.join(', '));return;}
  const R=XLSX.utils.sheet_to_json(pg6,{header:1,defval:null});

  // Find row by partial label match in col[6] (label column)
  const byLabel=(...terms)=>R.find(r=>{
    const lbl=(r?.[6]||r?.[1]||'').toString().toUpperCase();
    return terms.every(t=>lbl.includes(t.toUpperCase()));
  });
  // Also keep line-number finder as fallback
  const byLine=ln=>{const t=Number(ln);return R.find(r=>r&&r[0]!=null&&!isNaN(Number(r[0]))&&Number(r[0])===t);};
  const bl=ln=>byLine(ln);

  // Find each critical row by label, fall back to line number
  const rTCUV  = byLabel('TOTAL TOYOTA CERT USED','AFTER RECON')||bl(47);
  const rRecon = byLabel('Total Certified','Recon')||bl(57);
  const rFI    = byLabel('Certified Used Vehicle','F&I')||bl(65);
  const rTotal = byLabel('TOTAL USED VEHICLE DEPARTMENT')||bl(75);
  const rNew   = byLabel('TOTAL NEW VEHICLE DEPARTMENT')||bl(40);
  const rNC    = byLabel('TOT TOYOTA NON-CERT USED')||bl(53);
  const rOther = byLabel('TOTAL USED VEHICLE - OTHER AFTER RECON')||bl(62);
  // Non-cert and Other F&I rows
  const rNCFI  = byLabel('NON-CERT','F&I')||byLabel('NON-CERTIFIED','F&I')||bl(69);
  const rOtherFI = byLabel('OTHER','F&I')||byLabel('USED VEHICLE - OTHER','F&I')||bl(72);

  if(!rTCUV){msg('Cannot find TCUV row in Pg6. File may be unsupported format.');return;}

  // Col map: [0]=Line# [1]=Dealer Units [3]=Dealer GP [8]=GST Units [10]=GST GP
  const tuVal  = n(rTCUV?.[1]);
  const tgVal  = n(rTCUV?.[3]);
  const crVal  = n(rRecon?.[3]);
  const tFIVal = n(rFI?.[3]);
  const dGPVal = n(rTotal?.[3]);
  const totUsed= n(rTotal?.[1]);
  const newU   = n(rNew?.[1]);
  const nuVal  = n(rNC?.[1]);
  const ngVal  = n(rNC?.[3]);
  const ouVal  = n(rOther?.[1]);
  const ogVal  = n(rOther?.[3]);
  const nFIVal = n(rNCFI?.[3]);
  const oFIVal = n(rOtherFI?.[3]);

  // GST benchmarks
  const gTU_u  = n(rTCUV?.[8])||1;
  const gTG    = Math.round(n(rTCUV?.[10])/gTU_u);
  const gCR    = Math.round(n(rRecon?.[10])/gTU_u);
  const gTF    = Math.round(n(rFI?.[10])/gTU_u);

  const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=Math.round(v)||0;};
  sv('uTU',tuVal);sv('uTG',tgVal);sv('uFI',tFIVal);sv('uCR',crVal);sv('uDG',dGPVal);
  sv('uNU',nuVal);sv('uNG',ngVal);sv('uNFI',nFIVal);sv('uOU',ouVal);sv('uOG',ogVal);sv('uOFI',oFIVal);sv('uNW',newU);
  sv('gTG',gTG);sv('gCR',gCR);sv('gTF',gTF);sv('gTU',Math.round(gTU_u));

  const cc=gc();
  if(cc){
    cc.nm=dlrNm||cc.nm; cc.fn.nm=dlrNm||cc.fn.nm; cc.fn.pr=period||cc.fn.pr;
    cc.fn.tu=tuVal; cc.fn.tg=tgVal; cc.fn.tFI=tFIVal; cc.fn.cR=crVal;
    cc.fn.dGP=dGPVal; cc.fn.nu=nuVal; cc.fn.ng=ngVal; cc.fn.nFI=nFIVal;
    cc.fn.ou=ouVal; cc.fn.og=ogVal; cc.fn.oFI=oFIVal;
    cc.fn.newUnits=newU; cc.fn.tot=totUsed;
    cc.fn.gTG=gTG; cc.fn.dTG=gTG; cc.fn.gCR=gCR; cc.fn.dCR=gCR;
    cc.fn.gTF=gTF; cc.fn.dTF=gTF; cc.fn.gTU=Math.round(gTU_u);
    buildSel(); if(tb!=='up')render(); saveAll();
  }
  document.getElementById('d1').classList.add('done');
  document.getElementById('m1').innerHTML=`<div class="ok">✓ ${dlrNm||'Dealer'} · ${period||'Period parsed'} · TCUV: ${Math.round(tuVal)} avg/mo · Recon: $${Math.round(crVal/Math.max(tuVal,1)).toLocaleString()}/unit · F&amp;I: $${Math.round(tFIVal/Math.max(tuVal,1)).toLocaleString()}/unit</div>`;
}
function pDept(wb,n){
  const msg=e=>document.getElementById('m2').innerHTML=`<div style="color:${RE};font-size:12px;margin-top:6px;font-weight:600">⚠ ${e}</div>`;
  // Try UsedGP sheet, then first sheet
  const ug=wb.Sheets['UsedGP']||wb.Sheets[wb.SheetNames[0]];
  if(!ug){msg('UsedGP sheet not found. Sheets: '+wb.SheetNames.join(', '));return;}
  const R=XLSX.utils.sheet_to_json(ug,{header:1,defval:null});

  // Dealer name: row[0] col[1] is always the dealer name in UsedGP
  let dlrNm=(R[0]?.[1]||'').toString().trim();
  // Fallback: scan first few rows if row[0][1] is blank or generic
  if(!dlrNm||dlrNm.length<3||dlrNm.match(/^(GST|Class|Description|Used Car|Show|LINE|LABEL|CALC)/i)){
    for(let ri=0;ri<5;ri++){const row=R[ri]||[];for(let ci=0;ci<row.length;ci++){const v=(row[ci]||'').toString().trim();if(v&&v.length>3&&v.length<60&&isNaN(v)&&!v.match(/^(GST|Class|Description|Used Car|Show|Dlr|Grp|LINE|LABEL|CALC)/i)){dlrNm=v;break;}if(dlrNm)break;}}
  }

  if(dlrNm&&document.getElementById('uN'))document.getElementById('uN').value=dlrNm;

  // Robust line finder
  const bl=ln=>{const t=Number(ln);return R.find(r=>r&&r[0]!=null&&!isNaN(Number(r[0]))&&Number(r[0])===t);};
  // Also find by label in col[1]
  const byLbl=(...terms)=>R.find(r=>{const lbl=(r?.[1]||'').toString().toUpperCase();return terms.every(t=>lbl.includes(t.toUpperCase()));});

  const l1  = bl(1)  || byLbl('TOY','CERT','USED UNITS');
  const l2  = bl(2)  || byLbl('TOTAL G/P');
  const l3  = bl(3)  || byLbl('GP PUVR');
  const l11 = bl(11) || byLbl('CERT RECON');
  const l12 = bl(12) || byLbl('NON-CERT UNITS');
  const l13 = bl(13) || byLbl('NON-CERT','TOTAL G/P');
  const l14 = bl(14) || byLbl('NON-CERT','GP PUVR');
  const l42 = bl(42) || byLbl('F&I','PUVR');
  // Non-cert F&I line and Other F&I line
  const l43 = bl(43) || byLbl('NON-CERT','F&I');
  const l44 = bl(44) || byLbl('OTHER','F&I');
  // Other used lines
  const l31 = bl(31) || byLbl('OTHER USED','UNITS');
  const l32 = bl(32) || byLbl('OTHER USED','G/P');
  const l53 = bl(53) || byLbl('TOTAL USED VEH DEPT UNITS');
  const l54 = bl(54) || byLbl("G/P'");
  const l55 = bl(55) || byLbl('G/P PUVRL');
  const l56 = bl(56) || byLbl('USED/NEW RATIO');

  const tuVal   = n(l1?.[2]);
  const tgVal   = n(l2?.[2]);
  const reconPU = n(l11?.[2]);
  const crTotal = reconPU * Math.max(tuVal,1);
  const nuVal   = n(l12?.[2]);
  const ngVal   = n(l13?.[2]);
  // Non-cert F&I: try line 43, or compute from PUVR * units
  const ncFIPU  = n(l43?.[2]);
  const nFIVal  = ncFIPU * Math.max(nuVal,1);
  // Other used units and GP
  const ouVal   = n(l31?.[2]);
  const ogVal   = n(l32?.[2]);
  // Other F&I
  const otFIPU  = n(l44?.[2]);
  const oFIVal  = otFIPU * Math.max(ouVal,1);
  // Certified F&I
  const fiPU    = n(l42?.[2]);
  const tFIVal  = fiPU * Math.max(tuVal,1);
  const totVal  = n(l53?.[2]);
  const dGPVal  = n(l54?.[2]);
  const unRatio = n(l56?.[2]);
  const gstUnRatio=n(l56?.[3]);

  const gTG    = Math.round(n(l3?.[3]));
  const gCR    = Math.round(n(l11?.[3]));
  const gTF    = Math.round(n(l42?.[3]));
  const gTU    = Math.round(n(l1?.[3]));
  const gDeptGP= Math.round(n(l55?.[3]));

  const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=Math.round(v)||0;};
  sv('uTU',tuVal);sv('uTG',tgVal);sv('uFI',tFIVal);sv('uCR',crTotal);sv('uDG',dGPVal);
  sv('uNU',nuVal);sv('uNG',ngVal);sv('uNFI',nFIVal);sv('uOU',ouVal);sv('uOG',ogVal);sv('uOFI',oFIVal);
  sv('gTG',gTG);sv('gCR',gCR);sv('gTF',gTF);sv('gTU',gTU);

  const c=gc();
  if(c){
    c.nm=dlrNm||c.nm; c.fn.nm=dlrNm||c.fn.nm;
    c.fn.tu=tuVal; c.fn.tg=tgVal; c.fn.tFI=tFIVal; c.fn.cR=crTotal;
    c.fn.dGP=dGPVal; c.fn.nu=nuVal; c.fn.ng=ngVal; c.fn.nFI=nFIVal;
    c.fn.ou=ouVal; c.fn.og=ogVal; c.fn.oFI=oFIVal; c.fn.tot=totVal;
    c.fn.gTG=gTG; c.fn.dTG=gTG; c.fn.gCR=gCR; c.fn.dCR=gCR;
    c.fn.gTF=gTF; c.fn.dTF=gTF; c.fn.gTU=gTU;
    c.fn.gDeptGP=gDeptGP; c.fn.usedNewRatio=unRatio; c.fn.gstUsedNewRatio=gstUnRatio;
    buildSel(); if(tb!=='up')render(); saveAll();
  }
  document.getElementById('d2').classList.add('done');
  document.getElementById('m2').innerHTML=`<div class="ok">✓ ${dlrNm||'Dealer'}  -  TCUV: ${Math.round(tuVal)} avg/mo · Recon: $${Math.round(reconPU).toLocaleString()}/unit · F&amp;I: $${Math.round(fiPU).toLocaleString()}/unit · U:N: ${unRatio.toFixed(2)}</div>`;
}
function pRecap(wb,n){
  const ws=wb.Sheets[wb.SheetNames[0]];
  const R=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  const msg=e=>document.getElementById('m3').innerHTML=`<div style="color:${RE};font-size:12px;margin-top:6px;font-weight:600">${e}</div>`;

  // Find column positions from header rows
  let cS=-1,cG=-1,cT=-1,cO=-1;
  // Scan rows 0-5 for headers
  for(let h=0;h<Math.min(6,R.length);h++){
    const hr=R[h];if(!hr)continue;
    for(let j=0;j<hr.length;j++){
      const v=(hr[j]||'').toString().toUpperCase().trim();
      // TCUV Silver: "MTD SILVER" or "SILVER YTD" or "SILVER"
      if(v.includes('SILVER')&&cS<0)cS=j;
      // TCUV Gold: "MTD GOLD" or "GOLD YTD" or "GOLD"
      if(v.match(/\bGOLD\b/)&&cG<0)cG=j;
      // TCUV Total: "MTD TOTAL" or "TOTAL YTD" but ONLY near Silver/Gold columns
      if(v.match(/\b(MTD\s*)?TOTAL\b/)&&cT<0&&(cS>=0?Math.abs(j-cS)<=3:j>15))cT=j;
    }
  }
  // Infer missing from found columns
  if(cS>=0&&cG<0)cG=cS+1;
  if(cG>=0&&cT<0)cT=cG+1;
  if(cT>=0&&cS<0){cG=cT-1;cS=cT-2;}

  // TCUV Obj: look for "Obj" column AFTER the TCUV Total column (not the New Vehicle Obj)
  if(cT>=0){
    for(let h=0;h<Math.min(6,R.length);h++){
      const hr=R[h];if(!hr)continue;
      for(let j=cT+1;j<hr.length;j++){
        const v=(hr[j]||'').toString().toUpperCase().trim();
        if(v==='OBJ'&&cO<0)cO=j;
      }
    }
  }
  // If no TCUV Obj found after Total, skip it (will show 0 for obj)

  // Parse date from row 0
  let rcDate='Current';
  for(let h=0;h<Math.min(3,R.length);h++){
    for(let j=0;j<(R[h]||[]).length;j++){
      const dm=(R[h]?.[j]||'').toString().match(/(\d{2}\/\d{4})/);
      if(dm){rcDate=dm[1];break;}
    }
    if(rcDate!=='Current')break;
  }

  // Find header row (contains "GSTRECAP" or "Dealer" in col 0)
  let startRow=1;
  for(let h=0;h<Math.min(6,R.length);h++){
    const v=(R[h]?.[0]||'').toString().toUpperCase().trim();
    if(v.includes('GSTRECAP')||v.includes('DEALER')){startRow=h+1;break;}
  }

  // Parse dealer rows
  const ds=[];let dT=0,dO=0;
  for(let i=startRow;i<R.length;i++){
    const rw=R[i];if(!rw)continue;
    const lb=(rw[0]||'').toString().trim();
    if(!lb||lb.length<4)continue;
    // Skip non-dealer rows
    if(lb.match(/^(DEALER|GSTRECAP|HEADER|NEW VEHICLE|SALES)/i))continue;
    // District/region totals
    if(lb.match(/^district/i)){
      if(cT>=0)dT=n(rw[cT]);
      if(cO>=0)dO=n(rw[cO]);
      continue;
    }
    if(lb.match(/^(gst|group|national|area|region|tms)/i))continue;
    // Parse dealer: "42073-GROUP 1 TOYOTA SOUTHWEST HOUSTON"
    let code='',dname=lb.toUpperCase();
    const cdm=lb.match(/^(\d{4,6})\s*[-]\s*(.+)/);
    if(cdm){code=cdm[1];dname=cdm[2].trim();}
    // Get TCUV values
    const s=cS>=0?n(rw[cS]):0;
    const g=cG>=0?n(rw[cG]):0;
    const sold=cT>=0?n(rw[cT]):s+g;
    const obj=cO>=0?n(rw[cO]):0;
    if(sold>0||obj>0)ds.push({c:code,n:dname,s,g,t:sold,o:obj,p:obj>0?Math.round(sold/obj*100):0});
  }

  if(ds.length===0){
    msg('No dealer data found. Silver='+cS+' Gold='+cG+' Total='+cT+' Obj='+cO+' startRow='+startRow);
    return;
  }

  const cc=gc();
  if(cc){
    cc.rc={dt:rcDate,ds,
      di:{t:dT||ds.reduce((a,d)=>a+d.t,0),o:dO||ds.reduce((a,d)=>a+d.o,0),p:0},
      gs:{t:0,o:0,p:0}};
    cc.rc.di.p=cc.rc.di.o>0?Math.round(cc.rc.di.t/cc.rc.di.o*100):0;
    const matched=cc.rc.ds.find(d=>nm(d.n,cc.nm));
    if(matched){cc.mtd={sold:matched.t,obj:matched.o,silver:matched.s,gold:matched.g};}
  }
  buildSel();if(tb!=='up')render();saveAll();
  document.getElementById('d3').classList.add('done');
  document.getElementById('m3').innerHTML=`<div class="ok">Parsed ${ds.length} dealers | District: ${dT} sold / ${dO} obj | Silver=${cS} Gold=${cG} Total=${cT} TCUVObj=${cO}</div>`;
}

init();
