<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C8102E;--red-lt:rgba(200,16,46,.07);--red-dk:#a30e26;
  --gold:#8A6200;--gold-lt:rgba(138,98,0,.08);
  --green:#0A7C3A;--green-lt:rgba(10,124,58,.08);
  --blue:#1558B0;--blue-lt:rgba(21,88,176,.08);
  --purple:#5B21B6;--purple-lt:rgba(91,33,182,.08);
  --orange:#C2410C;--orange-lt:rgba(194,65,12,.08);
  --teal:#0E7490;--teal-lt:rgba(14,116,144,.08);
  --bg:#f4f1ea;--surface:#fff;--card:#fff;
  --bdr:#e7e5e4;--bdr-dk:#d4d4d4;
  --txt:#1a1a1a;--dim:#3A4252;--dim-m:#57534e;--dim-lt:#a8a29e;
  --hdr:#1a1a1a;
  --sh:0 1px 4px rgba(0,0,0,.09),0 1px 2px rgba(0,0,0,.06);
  --sh-md:0 4px 18px rgba(0,0,0,.11),0 2px 6px rgba(0,0,0,.06);
  --r:8px;--rl:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;min-height:100vh}

/* HEADER */
.hdr{background:#1a1a1a;color:#f4f1ea;padding:24px 32px;border-bottom:3px solid var(--red)}
.hdr-row{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.hdr-eyebrow{font-size:11px;letter-spacing:.2em;color:var(--red);margin-bottom:4px;font-family:'Helvetica Neue','Inter',sans-serif}
.hdr h1{margin:0;font-size:28px;font-weight:400;letter-spacing:-.01em;font-family:'Orbitron',sans-serif}
.hdr-sub{font-size:13px;color:#a8a29e;margin-top:4px}
.hdr-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.hdr input{padding:8px 12px;background:#2a2724;border:1px solid #57534e;color:#f4f1ea;font-size:13px;font-family:'Inter',sans-serif;width:240px;outline:none}
.hdr input:focus{border-color:var(--red)}

/* STATS BAR */
.stats{background:#fff;border-bottom:1px solid var(--bdr);padding:16px 32px}
.stats-grid{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(6,1fr);gap:24px}
.stat{}
.stat-lbl{font-size:11px;letter-spacing:.1em;color:var(--dim-m);text-transform:uppercase;margin-bottom:4px;font-family:'Helvetica Neue','Inter',sans-serif}
.stat-val{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:800;line-height:1.1}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--bdr)}
.nav-row{max-width:1400px;margin:0 auto;display:flex;gap:0}
.nav button{padding:14px 28px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--dim-m);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;cursor:pointer}
.nav button.active{background:var(--bg);color:var(--txt);border-bottom-color:var(--red)}
.nav button:hover:not(.active){color:var(--txt)}

/* MAIN */
main{max-width:1400px;margin:0 auto;padding:32px}

/* CARDS */
.card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:18px 22px;box-shadow:var(--sh);margin-bottom:14px}
.card-title{font-size:11px;color:var(--dim-m);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;font-family:'Helvetica Neue','Inter',sans-serif}

/* BUTTONS */
.btn{padding:9px 18px;border:none;border-radius:6px;background:#1a1a1a;color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:background .15s}
.btn:hover{background:#000}
.btn:disabled{background:#a8a29e;cursor:not-allowed}
.btn-red{background:var(--red)}
.btn-red:hover{background:var(--red-dk)}
.btn-blue{background:var(--blue)}
.btn-blue:hover{background:#0e3f7d}
.btn-green{background:var(--green)}
.btn-green:hover{background:#085a2a}
.btn-ghost{background:#fff;border:1px solid var(--bdr-dk);color:var(--dim-m)}
.btn-ghost:hover{background:#fafaf9;color:var(--txt)}
.btn-sm{padding:6px 12px;font-size:11px}

/* FORMS */
.fl{font-size:11px;color:var(--dim-m);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;display:block;font-family:'Helvetica Neue','Inter',sans-serif}
.fi{padding:8px 12px;border:1px solid var(--bdr-dk);border-radius:6px;background:#fff;font-size:13px;font-family:'Inter',sans-serif;outline:none;width:100%}
.fi:focus{border-color:var(--red)}
select.fi{cursor:pointer}

/* BADGES */
.badge{display:inline-flex;align-items:center;border-radius:4px;font-size:10px;font-weight:700;padding:3px 8px;letter-spacing:.05em;text-transform:uppercase;font-family:'Helvetica Neue','Inter',sans-serif}
.pill-red{background:var(--red-lt);color:var(--red)}
.pill-blue{background:var(--blue-lt);color:var(--blue)}
.pill-gold{background:var(--gold-lt);color:var(--gold)}
.pill-gray{background:#f4f4f4;color:var(--dim-m)}
.pill-green{background:var(--green-lt);color:var(--green)}
.pill-purple{background:var(--purple-lt);color:var(--purple)}

/* TABLES */
table{width:100%;border-collapse:collapse}
th{padding:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--dim-m);border-bottom:1.5px solid var(--bdr);text-align:left;font-family:'Helvetica Neue','Inter',sans-serif}
td{padding:10px;font-size:13px;border-bottom:1px solid var(--bdr);color:var(--txt)}
th.r,td.r{text-align:right}
th.c,td.c{text-align:center}
tr:hover td{background:#fafaf9}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.4);max-width:680px;width:100%;overflow:hidden;max-height:90vh;display:flex;flex-direction:column}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.modal-ttl{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:800;letter-spacing:.05em}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 22px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px;background:#fafaf9}

/* GRID HELPERS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}

/* WEEK PLAN */
.week-card{background:#fff;border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden;margin-bottom:18px;box-shadow:var(--sh)}
.week-hdr{padding:16px 20px;background:#fafaf9;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.week-ttl{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:800;letter-spacing:.02em}
.week-meta{font-size:12px;color:var(--dim-m);margin-top:3px}
.week-days{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:14px}
.day{background:#fafaf9;border:1px solid var(--bdr);border-radius:6px;padding:10px;min-height:120px}
.day-hdr{font-size:11px;font-weight:700;color:var(--dim-m);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.visit{background:#fff;border:1px solid var(--bdr);border-radius:5px;padding:7px 9px;margin-bottom:5px;font-size:11px}
.visit-time{font-weight:700;color:var(--red);font-family:'Orbitron',sans-serif;font-size:10px}
.visit-name{font-weight:600;line-height:1.3;margin-top:2px}
.visit-meta{color:var(--dim-m);font-size:10px;margin-top:2px}
.day-note{font-size:10px;color:var(--dim-lt);font-style:italic;padding:6px;background:#fff;border-radius:4px;margin-top:4px}

/* FILTERS */
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-end}
.filter-row .f{flex:1;min-width:150px}

/* TRIP CARDS */
.trip-card{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);transition:transform .15s,box-shadow .15s;cursor:pointer}
.trip-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.trip-name{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:800;margin-bottom:6px}
.trip-stats{font-size:12px;color:var(--dim-m);margin-bottom:10px}

/* DEALER ROW */
.dealer-row{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .1s}
.dealer-row:hover{background:#fafaf9}
.dealer-row.completed{opacity:.5}
.dealer-row.scheduled{background:var(--blue-lt)}

/* TOAST */
#toast{position:fixed;top:20px;right:20px;background:#1a1a1a;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:opacity .25s;z-index:9999;pointer-events:none}
</style>
</head>

  const dLng = toRad(b.lng - a.lng);
  const lat1 = toRad(a.lat);
  const lat2 = toRad(b.lat);
  const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(x));
}
function estimateDriveHours(miles) { return miles / 60; }

function enrichDealers() {
  return DEALERS_RAW.map((d) => {
    const inHouston60mi = d.dh !== null && d.dh <= 60;

      effectivePriority: isLeader ? d.ps * 0.3 : d.ps
    };

}

// ============ CLUSTERING ============
function clusterDealers(dealers) {
  const clusters = {
    "Houston Metro": [], "East Texas / Beaumont Corridor": [], "San Antonio / South Texas": [],
    "Rio Grande Valley": [], "Austin / Central Texas": [], "Dallas / Fort Worth Metroplex": [],
    "West Texas / El Paso": [], "Oklahoma": [], "Arkansas": [],
    "Louisiana - Baton Rouge / Lafayette": [], "Louisiana - Shreveport / Monroe": [],
    "Louisiana - New Orleans / Northshore": [], "Mississippi - North": [], "Mississippi - Central / South": []
  };
  dealers.forEach((d) => {
    const { state, lat, lng, inHouston60mi } = d;
    if (state === "TX" && inHouston60mi) clusters["Houston Metro"].push(d);
    else if (state === "TX" && lng > -95 && lat < 32 && !inHouston60mi) clusters["East Texas / Beaumont Corridor"].push(d);
    else if (state === "TX" && lat < 27.5) clusters["Rio Grande Valley"].push(d);
    else if (state === "TX" && lat < 30 && lng < -97) clusters["San Antonio / South Texas"].push(d);
    else if (state === "TX" && lng < -100) clusters["West Texas / El Paso"].push(d);
    else if (state === "TX" && lat > 32.5) clusters["Dallas / Fort Worth Metroplex"].push(d);
    else if (state === "TX" && lat > 29.5 && lng < -97) clusters["Austin / Central Texas"].push(d);
    else if (state === "OK") clusters["Oklahoma"].push(d);
    else if (state === "AR") clusters["Arkansas"].push(d);
    else if (state === "LA" && lng < -92.5) clusters["Louisiana - Shreveport / Monroe"].push(d);
    else if (state === "LA" && lng > -90.5) clusters["Louisiana - New Orleans / Northshore"].push(d);
    else if (state === "LA") clusters["Louisiana - Baton Rouge / Lafayette"].push(d);
    else if (state === "MS" && lat > 33.5) clusters["Mississippi - North"].push(d);
    else if (state === "MS") clusters["Mississippi - Central / South"].push(d);
    else if (state === "TX") clusters["East Texas / Beaumont Corridor"].push(d);
  });
  return clusters;
}

// ============ ROUTE ORDERING ============
function orderByProximity(dealers, startPoint) {
  if (dealers.length === 0) return [];
  const remaining = [...dealers];
  const ordered = [];
  let current = startPoint;
  while (remaining.length > 0) {
    let bestIdx = 0, bestDist = Infinity;
    remaining.forEach((d, i) => {
      const dist = distanceMiles(current, { lat: d.lat, lng: d.lng });
      if (dist < bestDist) { bestDist = dist; bestIdx = i; }
    });
    const picked = remaining.splice(bestIdx, 1)[0];
    ordered.push(picked);
    current = { lat: picked.lat, lng: picked.lng };
  }
  return ordered;
}
function packIntoDays(orderedDealers, maxPerDay = 3) {
  const days = [];
  let i = 0;
  while (i < orderedDealers.length) {
    const remaining = orderedDealers.length - i;
    let take;
    if (remaining <= maxPerDay) take = remaining;
    else if (remaining === maxPerDay + 1) take = 2;
    else take = maxPerDay;
    days.push(orderedDealers.slice(i, i + take));
    i += take;
  }
  return days;
}
function assignTimes(dayVisits) {
  const slots = { 3: ["10:00", "13:00", "15:00"], 2: ["10:00", "13:00"], 1: ["10:00"] };
  const s = slots[dayVisits.length] || slots[3];
  return dayVisits.map((d, i) => ({ dealer: d, time: s[i] }));
}
function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
// Convert 24-hour "HH:MM" -> 12-hour "h:MM AM/PM" for display
function fmt12(t) {
  if (!t || typeof t !== "string") return t || "";
  const m = t.match(/^(\d{1,2}):(\d{2})/);
  if (!m) return t;
  let h = parseInt(m[1], 10);
  const min = m[2];
  const period = h >= 12 ? "PM" : "AM";
  if (h === 0) h = 12;
  else if (h > 12) h -= 12;
  return `${h}:${min} ${period}`;
}
function mondayOf(date) {
  const d = new Date(date);
  const dow = d.getDay();
  const diff = d.getDate() - dow + (dow === 0 ? -6 : 1);
  d.setDate(diff);
  d.setHours(0, 0, 0, 0);
  return d;
}

// ============ WEEK PLANNING ============
function selectWeekTarget(clusters, availableDealers) {
  const scored = Object.entries(clusters)
    .filter(([name]) => name !== "Houston Metro")
    .map(([name, dealers]) => {
      const avail = dealers.filter((d) => availableDealers.has(d.dealer_num) && !d.isLeader);
      const inPerson = avail.filter((d) => d.visitMode === "In-Person");
      if (inPerson.length === 0) return null;
      const t1 = inPerson.filter((d) => d.tier === "Tier 1").length;
      const t2 = inPerson.filter((d) => d.tier === "Tier 2").length;
      const t3 = inPerson.filter((d) => d.tier === "Tier 3").length;
      const t4 = inPerson.filter((d) => d.tier === "Tier 4").length;
      const score = t1 * 3 + t2 * 2 + t3 * 1.5 + t4 * 1;
      return { name, dealers, inPerson, score, tier1: t1, tier2: t2, tier3: t3, tier4: t4 };
    })
    .filter(Boolean)
    .sort((a, b) => b.score - a.score);
  return scored;
}

function planWeek(startDate, clusters, availableDealers) {
  const monday = mondayOf(new Date(startDate + "T00:00:00"));
  const days = [0, 1, 2, 3, 4].map((o) => { const d = new Date(monday); d.setDate(d.getDate() + o); return d; });
  const [mon, tue, wed, thu, fri] = days;

  const candidates = selectWeekTarget(clusters, availableDealers);
  if (candidates.length === 0) return { weekOf: fmtDate(monday), empty: true, reason: "No regions have unscheduled priority dealers remaining." };

  const target = candidates[0];
  const sample = target.inPerson[0];
  const isOutOfState = sample.outOfState;
  const distFromHou = sample.distToHouston || 0;
  const driveHours = estimateDriveHours(distFromHou);
  const mustFly = driveHours > 4 || isOutOfState;

  const startPoint = mustFly ? { lat: sample.lat, lng: sample.lng } : HOUSTON;
  const tierOrder = { "Tier 1": 0, "Tier 2": 1, "Tier 3": 2, "Tier 4": 3 };
  const sortedInPerson = [...target.inPerson].sort((a, b) => {
    if (a.tier !== b.tier) return tierOrder[a.tier] - tierOrder[b.tier];
    return b.priority_score - a.priority_score;
  });
  const maxForWeek = isOutOfState ? 9 : 12;
  const weekDealers = sortedInPerson.slice(0, maxForWeek);
  const ordered = orderByProximity(weekDealers, startPoint);
  const packedDays = packIntoDays(ordered, 3);

  const visitDays = isOutOfState ? [mon, tue, wed] : [mon, tue, wed, thu];
  const dayPlan = [];
  packedDays.slice(0, visitDays.length).forEach((dv, idx) => {
    const assigned = assignTimes(dv);
    dayPlan.push({
      date: fmtDate(visitDays[idx]),
      label: visitDays[idx].toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" }),
      visits: assigned.map((a) => ({ ...a, mode: "In-Person", region: target.name })),
      type: "visit"
    });
  });
  if (isOutOfState) {
    dayPlan.push({
      date: fmtDate(thu),
      label: thu.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" }),
      visits: [], type: "travel",
      note: "Fly / drive back to Houston. Arrive by Friday morning."
    });
  }
  dayPlan.push(planFriday(fri, clusters, availableDealers, !isOutOfState));

  return {
    weekOf: fmtDate(monday), region: target.name, mustFly, isOutOfState,
    driveHours: driveHours.toFixed(1), days: dayPlan,
    summary: {
      totalVisits: dayPlan.reduce((s, d) => s + d.visits.length, 0),
      tier1: weekDealers.filter((d) => d.tier === "Tier 1").length,
      tier2: weekDealers.filter((d) => d.tier === "Tier 2").length,
      tier3: weekDealers.filter((d) => d.tier === "Tier 3").length,
      tier4: weekDealers.filter((d) => d.tier === "Tier 4").length
    }
  };
}

function planFriday(friDate, clusters, availableDealers, canDoHouston) {
  const houston = clusters["Houston Metro"] || [];
  const avail = houston.filter((d) => availableDealers.has(d.dealer_num) && !d.isLeader && d.visitMode === "In-Person");
  if (canDoHouston && avail.length >= 2) {
    const picked = [...avail].sort((a, b) => b.priority_score - a.priority_score).slice(0, 2);
    const ordered = orderByProximity(picked, HOUSTON);
    return {
      date: fmtDate(friDate),
      label: friDate.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" }),
      visits: ordered.map((d, i) => ({ dealer: d, time: ["10:00", "13:00"][i], mode: "In-Person", region: "Houston Metro" })),
      type: "visit",
      note: "Houston metro day. Visits end by 2 PM to close the week early."
    };
  }
  const all = Object.values(clusters).flat();
  const teams = all.filter((d) => availableDealers.has(d.dealer_num) && !d.isLeader && d.visitMode === "Teams");
  const picked = [...teams].sort((a, b) => b.priority_score - a.priority_score).slice(0, 2);
  return {
    date: fmtDate(friDate),
    label: friDate.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" }),
    visits: picked.map((d, i) => ({ dealer: d, time: ["10:00", "11:00"][i], mode: "Teams", region: "Teams Calls" })),
    type: "teams",
    note: "Friday Teams window (10 AM - 12 PM). Wraps up the week."
  };
}

function planMultipleWeeks(startDate, numWeeks, clusters, completedIds, scheduledIds, recentTouches, cooldownDays) {
  // Cooldown: dealers touched (visit/Teams) within cooldownDays get skipped
  const cooledDown = new Set();
  if (recentTouches && cooldownDays > 0) {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - cooldownDays);
    Object.entries(recentTouches).forEach(([num, info]) => {
      if (!info || !info.lastTouchDate) return;
      const td = new Date(info.lastTouchDate);
      if (!isNaN(td) && td >= cutoff) cooledDown.add(Number(num));
    });
  }

  const available = new Set();
  Object.values(clusters).flat().forEach((d) => {
    if (completedIds.has(d.dealer_num)) return;
    if (scheduledIds.has(d.dealer_num)) return;
    if (cooledDown.has(d.dealer_num)) return;
    if (d.isLeader) return;
    available.add(d.dealer_num);
  });

  const weeks = [];
  let currentStart = new Date(startDate + "T00:00:00");
  for (let w = 0; w < numWeeks; w++) {
    const plan = planWeek(fmtDate(currentStart), clusters, available);
    if (plan.empty) break;
    weeks.push(plan);
    plan.days.forEach((d) => d.visits.forEach((v) => available.delete(v.dealer.dealer_num)));
    currentStart.setDate(currentStart.getDate() + 7);
  }
  return weeks;
}

// Default start date: next Monday
function defaultStart() {
  const today = new Date();
  const monday = mondayOf(today);
  if (today.getDay() === 6 || today.getDay() === 0 || (today.getDay() === 5 && today.getHours() >= 12)) monday.setDate(monday.getDate() + 7);
  else if (today > monday) monday.setDate(monday.getDate() + 7);
  return fmtDate(monday);
}
state.startDate = defaultStart();

// Persist to localStorage so refreshes keep the schedule
function saveState() {
  try {
    const persist = {
      completedIds: [...state.completedIds],
      scheduledVisits: state.scheduledVisits,
      senderName: state.senderName,
      recentTouches: state.recentTouches,
      cooldownDays: state.cooldownDays
    };
    localStorage.setItem("tcuv-agent-state", JSON.stringify(persist));
  } catch (e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem("tcuv-agent-state");
    if (!raw) return;
    const p = JSON.parse(raw);
    if (Array.isArray(p.completedIds)) state.completedIds = new Set(p.completedIds);
    if (Array.isArray(p.scheduledVisits)) state.scheduledVisits = p.scheduledVisits;
    if (p.senderName) state.senderName = p.senderName;
    if (p.recentTouches) state.recentTouches = p.recentTouches;
    if (typeof p.cooldownDays === "number") state.cooldownDays = p.cooldownDays;
  } catch (e) {}
}

function showToast(msg, color) {

}

function exportCSV() {
  if (state.scheduledVisits.length === 0) return;
  const header = "Date,Time,Dealer #,Dealer Name,Address,City,State,ZIP,Phone,GM,GM Email,Tier,Designation,Mode,Email Sent\n";

    .sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time))
    .map(v => {

    }).join("\n");
  const blob = new Blob([header + rows], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "dealer_schedule.csv"; a.click();
  URL.revokeObjectURL(url);

}

function renderPlan(main) {
  const scheduledIds = new Set(state.scheduledVisits.map(v => v.dealer_num));
  const cooledCount = Object.entries(state.recentTouches || {}).filter(([, info]) => {
    if (!info || !info.lastTouchDate) return false;
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - state.cooldownDays);
    return new Date(info.lastTouchDate) >= cutoff;
  }).length;

  let html = `
    <div class="card" style="border-left:3px solid #1558B0">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
        <div style="flex:1;min-width:280px">
          <div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#1558B0;margin-bottom:6px">Visit History From Dashboard</div>
          <div style="font-size:13px;color:#57534e;line-height:1.5">
            Paste the JSON exported from the TCUV CRM dashboard so the scheduler skips dealers you've already visited or had a Teams call with recently.
            ${cooledCount > 0 ? `<strong style="color:#1558B0">${cooledCount} dealer(s) currently within cooldown.</strong>` : ""}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <label style="font-size:12px;color:#57534e">Cooldown (days):</label>
          <input type="number" min="0" max="365" value="${state.cooldownDays}" onchange="state.cooldownDays = parseInt(this.value)||0; saveState();" style="width:80px" class="fi">
        </div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <textarea id="historyPaste" placeholder='Paste JSON from dashboard, e.g. [{"dealer_num":42087,"name":"DON MCGILL TOYOTA","lastTouchDate":"2026-03-14","lastTouchType":"Visit"}, ...]' style="flex:1;min-width:280px;min-height:60px;padding:8px 10px;border:1px solid #d4d4d4;border-radius:6px;font-family:'SF Mono',Menlo,monospace;font-size:12px"></textarea>
        <button class="btn btn-blue" onclick="importHistory()">Import</button>
        ${Object.keys(state.recentTouches).length > 0 ? `<button class="btn btn-ghost" onclick="clearHistory()">Clear</button>` : ""}
      </div>
      ${state.importMsg ? `<div style="margin-top:10px;font-size:12px;color:#0A7C3A">${state.importMsg}</div>` : ""}
    </div>

    <div class="card">
      <div class="card-title">Plan My Week</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end">
        <div><label class="fl">Start Date (Monday)</label><input type="date" id="startDate" value="${state.startDate}" class="fi" style="width:180px" onchange="state.startDate = this.value;"></div>
        <div><label class="fl">Number of Weeks</label><input type="number" id="numWeeks" value="${state.numWeeks}" min="1" max="12" class="fi" style="width:100px" onchange="state.numWeeks = parseInt(this.value)||4;"></div>
        <button class="btn btn-red" onclick="generatePlan()">Generate Plan</button>
        ${state.plan && state.plan.length > 0 ? `<button class="btn btn-ghost" onclick="state.plan=null; state.approvedWeeks=new Set(); render();">Clear Plan</button>` : ""}
      </div>
      <div style="font-size:12px;color:#57534e;margin-top:10px;line-height:1.5">
        Each week proposes <strong>one regional cluster</strong> for Mon-Thu (or Mon-Wed + travel back if out of state), with Friday reserved for Houston metro visits or Teams calls. Approved weeks add visits to your schedule.
      </div>
    </div>
  `;

  if (state.plan && state.plan.length > 0) {
    html += `<div style="margin-top:18px">`;
    state.plan.forEach((week, idx) => {
      html += renderWeekCard(week, idx);
    });
    html += `</div>`;
  }
  main.innerHTML = html;
}

function generatePlan() {
  const sd = document.getElementById("startDate").value || state.startDate;
  const nw = parseInt(document.getElementById("numWeeks").value) || 4;
  state.startDate = sd; state.numWeeks = nw;
  const scheduledIds = new Set(state.scheduledVisits.map(v => v.dealer_num));
  state.plan = planMultipleWeeks(sd, nw, clusters, state.completedIds, scheduledIds, state.recentTouches, state.cooldownDays);
  state.approvedWeeks = new Set();
  render();
  if (state.plan.length === 0) {
    showToast("No weeks could be planned. All eligible dealers may be scheduled or in cooldown.", "#C8102E");
  }
}

function renderWeekCard(week, idx) {
  const isApproved = state.approvedWeeks.has(idx);
  const totalVisits = week.summary.totalVisits;
  return `
    <div class="week-card">
      <div class="week-hdr" style="${isApproved ? 'background:rgba(10,124,58,.08);border-bottom-color:rgba(10,124,58,.25)' : ''}">
        <div>
          <div class="week-ttl">Week of ${week.weekOf} &middot; ${week.region || "Multi-region"}</div>
          <div class="week-meta">
            ${totalVisits} visits &middot;
            ${week.mustFly ? "✈ Flight required" : "🚗 Drive"} &middot;
            ~${week.driveHours}h drive from Houston
            ${week.summary.tier1 > 0 ? ` &middot; <span style="color:#C8102E;font-weight:600">${week.summary.tier1} Tier 1</span>` : ""}
            ${week.summary.tier2 > 0 ? ` &middot; ${week.summary.tier2} Tier 2` : ""}
          </div>
        </div>
        <div style="display:flex;gap:8px">
          ${isApproved
            ? `<span class="badge pill-green">✓ Approved</span>`
            : `<button class="btn btn-green btn-sm" onclick="approveWeek(${idx})">Approve Week</button><button class="btn btn-ghost btn-sm" onclick="rejectWeek(${idx})">Reject</button>`}
        </div>
      </div>
      <div class="week-days">
        ${week.days.map(day => renderDay(day, week, idx)).join("")}
      </div>
    </div>
  `;
}

function renderDay(day, week, weekIdx) {
  let body = "";
  if (day.type === "travel") {
    body = `<div style="font-size:11px;color:#57534e;font-style:italic;padding:14px 6px;text-align:center">✈ Travel day</div>`;
  } else if (day.visits.length === 0) {
    body = `<div style="font-size:11px;color:#a8a29e;font-style:italic;padding:14px 6px;text-align:center">Open</div>`;
  } else {
    body = day.visits.map(v => `
      <div class="visit">
        <div class="visit-time">${fmt12(v.time)} ${v.mode === "Teams" ? "📹" : "📍"}</div>
        <div class="visit-name">${v.dealer.name}</div>
        <div class="visit-meta">${v.dealer.city}, ${v.dealer.state} &middot; ${v.dealer.tier}</div>
      </div>
    `).join("");
  }
  if (day.note) body += `<div class="day-note">${day.note}</div>`;
  return `
    <div class="day">
      <div class="day-hdr">${day.label}</div>
      ${body}
    </div>
  `;
}

function approveWeek(idx) {
  const week = state.plan[idx];
  week.days.forEach(day => day.visits.forEach(v => scheduleVisit(v.dealer, day.date, v.time, v.mode)));
  state.approvedWeeks.add(idx);
  showToast(`✓ Week of ${week.weekOf} approved (${week.summary.totalVisits} visits added)`, "#0A7C3A");
  render();
}
function rejectWeek(idx) {
  state.plan = state.plan.filter((_, i) => i !== idx);
  // Re-key approvedWeeks
  const newApproved = new Set();
  state.approvedWeeks.forEach(i => { if (i < idx) newApproved.add(i); else if (i > idx) newApproved.add(i - 1); });
  state.approvedWeeks = newApproved;
  render();
}

// ============ TRIP SUGGESTIONS ============
function renderTrips(main) {
  const scheduledIds = new Set(state.scheduledVisits.map(v => v.dealer_num));
  const trips = Object.entries(clusters).map(([name, dealers]) => {
    const avail = dealers.filter(d => !state.completedIds.has(d.dealer_num) && !scheduledIds.has(d.dealer_num));
    const inPerson = avail.filter(d => d.visitMode === "In-Person" && !d.isLeader);
    const teams = avail.filter(d => d.visitMode === "Teams" && !d.isLeader);
    const tier1 = inPerson.filter(d => d.tier === "Tier 1").length;
    const tier2 = inPerson.filter(d => d.tier === "Tier 2").length;
    const tier3 = inPerson.filter(d => d.tier === "Tier 3").length;
    const tier4 = inPerson.filter(d => d.tier === "Tier 4").length;
    const sample = inPerson[0] || teams[0];
    const dist = sample ? sample.distToHouston : 0;
    return { name, dealers, avail, inPerson, teams, tier1, tier2, tier3, tier4, dist, score: tier1 * 3 + tier2 * 2 + tier3 * 1.5 + tier4 };
  }).filter(t => t.avail.length > 0).sort((a, b) => b.score - a.score);

  let html = `
    <div class="card-title" style="margin-bottom:14px">Regional Trip Suggestions &middot; Sorted by Priority</div>
    <div class="g3" style="grid-template-columns:repeat(auto-fill,minmax(320px,1fr))">
  `;
  trips.forEach(t => {
    html += `
      <div class="trip-card" onclick="selectCluster('${t.name.replace(/'/g, "\\'")}')">
        <div class="trip-name">${t.name}</div>
        <div class="trip-stats">
          ${t.inPerson.length} in-person &middot; ${t.teams.length} Teams
          ${t.dist > 0 ? ` &middot; ~${Math.round(t.dist)}mi from Houston` : " &middot; Houston anchor"}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
          ${t.tier1 > 0 ? `<span class="badge pill-red">${t.tier1} Tier 1</span>` : ""}
          ${t.tier2 > 0 ? `<span class="badge pill-gold">${t.tier2} Tier 2</span>` : ""}
          ${t.tier3 > 0 ? `<span class="badge pill-gray">${t.tier3} Tier 3</span>` : ""}
          ${t.tier4 > 0 ? `<span class="badge pill-gray">${t.tier4} Tier 4</span>` : ""}
        </div>
        <div style="font-size:12px;color:#57534e">Click to view dealer list</div>
      </div>
    `;
  });
  html += `</div>`;

  if (state.selectedCluster) {
    const cluster = trips.find(t => t.name === state.selectedCluster);
    if (cluster) {
      html += `
        <div class="card" style="margin-top:18px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
            <div class="card-title" style="margin:0">${cluster.name} &middot; ${cluster.avail.length} available</div>
            <button class="btn btn-ghost btn-sm" onclick="state.selectedCluster=null;render();">Close</button>
          </div>
          <table>
            <thead><tr><th>Dealer</th><th>City</th><th class="c">Tier</th><th class="c">Mode</th><th class="r">Priority</th><th></th></tr></thead>
            <tbody>
              ${cluster.avail.sort((a, b) => b.priority_score - a.priority_score).map(d => `
                <tr>
                  <td><strong>${d.name}</strong>${d.isLeader ? ' <span class="badge pill-gray" style="margin-left:6px">Leader</span>' : ''}</td>
                  <td>${d.city}, ${d.state}</td>
                  <td class="c"><span class="badge ${tierBadge(d.tier)}">${d.tier}</span></td>
                  <td class="c">${d.visitMode === "Teams" ? "📹 Teams" : "📍 In-Person"}</td>
                  <td class="r">${(d.priority_score * 100).toFixed(0)}%</td>
                  <td><button class="btn btn-sm" onclick="openSchedule(${d.dealer_num})">Schedule</button></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }
  }

  main.innerHTML = html;
}
function selectCluster(name) {
  state.selectedCluster = state.selectedCluster === name ? null : name;
  render();
}
function tierBadge(tier) {
  if (tier === "Tier 1") return "pill-red";
  if (tier === "Tier 2") return "pill-gold";
  if (tier === "Tier 3") return "pill-gray";
  return "pill-gray";
}

// ============ MY SCHEDULE ============
function renderSchedule(main) {
  if (state.scheduledVisits.length === 0) {
    main.innerHTML = `
      <div class="card" style="text-align:center;padding:50px 20px">
        <div style="font-size:36px;margin-bottom:10px;opacity:.4">📅</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:6px">No visits scheduled yet</div>
        <div style="font-size:13px;color:#57534e">Use <strong>Plan My Week</strong> to generate a multi-week plan, or pick from <strong>Trip Suggestions</strong> or the <strong>Dealer Directory</strong>.</div>
      </div>
    `;
    return;
  }
  const sorted = [...state.scheduledVisits].sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));
  // Group by week
  const groups = {};
  sorted.forEach(v => {
    const monday = mondayOf(new Date(v.date + "T00:00:00"));
    const wk = fmtDate(monday);
    if (!groups[wk]) groups[wk] = [];
    groups[wk].push(v);
  });

  let html = `<div class="card-title" style="margin-bottom:14px">My Schedule &middot; ${sorted.length} visits</div>`;
  Object.entries(groups).forEach(([wk, visits]) => {
    html += `
      <div class="card">
        <div class="card-title">Week of ${wk}</div>
        <table>
          <thead><tr><th>Date</th><th>Time</th><th>Dealer</th><th>City</th><th class="c">Tier</th><th class="c">Mode</th><th>Email</th><th></th></tr></thead>
          <tbody>
            ${visits.map(v => `
              <tr>
                <td>${v.date}</td>
                <td><strong>${fmt12(v.time)}</strong></td>
                <td><strong>${v.name}</strong></td>
                <td>${v.city}, ${v.state}</td>
                <td class="c"><span class="badge ${tierBadge(v.tier)}">${v.tier}</span></td>
                <td class="c">${v.mode === "Teams" ? "📹" : "📍"} ${v.mode}</td>
                <td>${v.emailSent ? '<span class="badge pill-green">✓ Sent</span>' : '<span class="badge pill-gray">Not sent</span>'}</td>
                <td>
                  <button class="btn btn-sm btn-blue" onclick="openEmail('${v.id}')">Email</button>
                  <button class="btn btn-sm btn-green" onclick="completeVisit('${v.id}'); render(); showToast('✓ Marked complete','#0A7C3A');">Done</button>
                  <button class="btn btn-sm btn-ghost" onclick="if(confirm('Remove this visit?')){unscheduleVisit('${v.id}'); render();}">✕</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;
  });

  // Completed dealers section
  if (state.completedIds.size > 0) {
    html += `
      <div class="card">
        <div class="card-title">Completed (${state.completedIds.size})</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${[...state.completedIds].map(num => {
            const d = ALL_DEALERS.find(x => x.dealer_num === num);
            if (!d) return "";
            return `<span class="badge pill-green" style="padding:6px 12px;cursor:pointer" onclick="if(confirm('Mark ${d.name} as not yet visited?')){uncompleteDealer(${num}); render();}">${d.name} ✕</span>`;
          }).join("")}
        </div>
        <div style="font-size:11px;color:#a8a29e;margin-top:8px">Click a dealer to mark as not yet visited.</div>
      </div>
    `;
  }
  main.innerHTML = html;
}

// ============ DEALER DIRECTORY ============
function renderDirectory(main) {
  const scheduledIds = new Set(state.scheduledVisits.map(v => v.dealer_num));
  const filtered = ALL_DEALERS.filter(d => {
    if (state.filterTier !== "All" && d.tier !== state.filterTier) return false;
    if (state.filterMode !== "All" && d.visitMode !== state.filterMode) return false;
    if (state.filterDes === "Non-Leaders Only" && d.isLeader) return false;
    if (state.filterDes === "Leaders Only" && !d.isLeader) return false;
    if (state.searchTerm) {
      const q = state.searchTerm.toLowerCase();
      if (!d.name.toLowerCase().includes(q) && !String(d.dealer_num).includes(q) && !d.city.toLowerCase().includes(q)) return false;
    }
    return true;
  }).sort((a, b) => b.effectivePriority - a.effectivePriority);

  main.innerHTML = `
    <div class="card">
      <div class="filter-row">
        <div class="f"><label class="fl">Search</label><input type="text" class="fi" id="searchTerm" value="${state.searchTerm}" placeholder="Name, city, dealer #" oninput="state.searchTerm=this.value; renderDirectoryOnly();"></div>
        <div class="f"><label class="fl">Tier</label><select class="fi" onchange="state.filterTier=this.value; render();"><option ${state.filterTier === "All" ? "selected" : ""}>All</option><option ${state.filterTier === "Tier 1" ? "selected" : ""}>Tier 1</option><option ${state.filterTier === "Tier 2" ? "selected" : ""}>Tier 2</option><option ${state.filterTier === "Tier 3" ? "selected" : ""}>Tier 3</option><option ${state.filterTier === "Tier 4" ? "selected" : ""}>Tier 4</option></select></div>
        <div class="f"><label class="fl">Mode</label><select class="fi" onchange="state.filterMode=this.value; render();"><option ${state.filterMode === "All" ? "selected" : ""}>All</option><option ${state.filterMode === "In-Person" ? "selected" : ""}>In-Person</option><option ${state.filterMode === "Teams" ? "selected" : ""}>Teams</option></select></div>
        <div class="f"><label class="fl">Designation</label><select class="fi" onchange="state.filterDes=this.value; render();"><option ${state.filterDes === "All" ? "selected" : ""}>All</option><option ${state.filterDes === "Non-Leaders Only" ? "selected" : ""}>Non-Leaders Only</option><option ${state.filterDes === "Leaders Only" ? "selected" : ""}>Leaders Only</option></select></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Dealers (${filtered.length} of ${ALL_DEALERS.length})</div>
      <table>
        <thead><tr><th>Dealer</th><th>City</th><th>State</th><th class="c">Tier</th><th class="c">Mode</th><th>Designation</th><th class="r">Priority</th><th class="r">TCUV YTD</th><th></th></tr></thead>
        <tbody>
          ${filtered.map(d => {
            const isCompleted = state.completedIds.has(d.dealer_num);
            const isScheduled = scheduledIds.has(d.dealer_num);
            return `
              <tr style="${isCompleted ? 'opacity:.55' : ''}${isScheduled ? 'background:rgba(21,88,176,.05)' : ''}">
                <td><strong>${d.name}</strong> <span style="color:#a8a29e;font-size:11px">#${d.dealer_num}</span>${d.isLeader ? ' <span class="badge pill-gray" style="margin-left:4px">Leader</span>' : ''}</td>
                <td>${d.city}</td>
                <td>${d.state}</td>
                <td class="c"><span class="badge ${tierBadge(d.tier)}">${d.tier}</span></td>
                <td class="c">${d.visitMode === "Teams" ? "📹" : "📍"}</td>
                <td style="font-size:12px;color:#57534e">${d.designation}</td>
                <td class="r">${(d.priority_score * 100).toFixed(0)}%</td>
                <td class="r">${d.tcuv_ytd}</td>
                <td>
                  ${isCompleted
                    ? `<button class="btn btn-sm btn-ghost" onclick="uncompleteDealer(${d.dealer_num}); render();">Reopen</button>`
                    : isScheduled
                      ? `<span class="badge pill-blue">Scheduled</span>`
                      : `<button class="btn btn-sm" onclick="openSchedule(${d.dealer_num})">Schedule</button>`}
                </td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;
}
function renderDirectoryOnly() {
  // For search input, re-render only the directory portion to preserve focus
  const main = document.getElementById("main");
  const searchVal = document.getElementById("searchTerm").value;
  state.searchTerm = searchVal;
  renderDirectory(main);
  const inp = document.getElementById("searchTerm");
  if (inp) { inp.focus(); inp.setSelectionRange(searchVal.length, searchVal.length); }
}

// ============ SCHEDULING MODAL ============
function openSchedule(dealerNum) {
  const dealer = ALL_DEALERS.find(d => d.dealer_num === dealerNum);
  if (!dealer) return;
  const today = new Date(); const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const dd = String(today.getDate() + 7).padStart(2, "0");
  const defaultDate = `${yyyy}-${mm}-${dd}`;

  const modal = document.createElement("div");
  modal.className = "modal-bg";
  modal.id = "schedModal";
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-hdr">
        <div class="modal-ttl">Schedule Visit &middot; ${dealer.name}</div>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('schedModal').remove()">✕</button>
      </div>
      <div class="modal-body">
        <div style="font-size:13px;color:#57534e;margin-bottom:14px">${dealer.address}, ${dealer.city}, ${dealer.state} ${dealer.zip}</div>
        <div class="g3" style="margin-bottom:14px">
          <div><label class="fl">Date</label><input type="date" id="schedDate" class="fi" value="${defaultDate}"></div>
          <div><label class="fl">Time</label><input type="time" id="schedTime" class="fi" value="10:00"></div>
          <div><label class="fl">Mode</label><select id="schedMode" class="fi"><option ${dealer.visitMode === "In-Person" ? "selected" : ""}>In-Person</option><option ${dealer.visitMode === "Teams" ? "selected" : ""}>Teams</option></select></div>
        </div>
        <div style="font-size:12px;color:#57534e;background:#fafaf9;border:1px solid #e7e5e4;border-radius:6px;padding:10px;line-height:1.5">
          <strong>Default mode:</strong> ${dealer.visitMode}. Designation: <strong>${dealer.designation}</strong>.
          ${dealer.outOfState ? `<br>Out-of-state dealer (${dealer.state}). Plan for travel.` : ""}
          ${dealer.distToHouston > 0 ? `<br>Distance from Houston: ~${Math.round(dealer.distToHouston)} mi.` : ""}
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="document.getElementById('schedModal').remove()">Cancel</button>
        <button class="btn btn-red" onclick="confirmSchedule(${dealer.dealer_num})">Schedule Visit</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}
function confirmSchedule(dealerNum) {
  const dealer = ALL_DEALERS.find(d => d.dealer_num === dealerNum);
  const date = document.getElementById("schedDate").value;
  const time = document.getElementById("schedTime").value;
  const mode = document.getElementById("schedMode").value;
  if (!date || !time) { alert("Date and time required."); return; }
  scheduleVisit(dealer, date, time, mode);
  document.getElementById("schedModal").remove();
  showToast(`✓ Scheduled: ${dealer.name} on ${date} at ${fmt12(time)}`, "#0A7C3A");
  render();
}

// ============ EMAIL MODAL ============
function openEmail(visitId) {
  const v = state.scheduledVisits.find(x => x.id === visitId);
  if (!v) return;
  const dealer = ALL_DEALERS.find(d => d.dealer_num === v.dealer_num);
  const email = generateEmail(dealer, v.date, v.time, v.mode, state.senderName);

  const modal = document.createElement("div");
  modal.className = "modal-bg";
  modal.id = "emailModal";
  modal.innerHTML = `
    <div class="modal" style="max-width:760px">
      <div class="modal-hdr">
        <div class="modal-ttl">Email Draft &middot; ${dealer.name}</div>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('emailModal').remove()">✕</button>
      </div>
      <div class="modal-body">
        <div class="g2" style="margin-bottom:10px">
          <div><label class="fl">To</label><input class="fi" id="emTo" value="${email.recipient || ""}"></div>
          <div><label class="fl">CC</label><input class="fi" id="emCc" value="${email.cc || ""}"></div>
        </div>
        <div style="margin-bottom:10px"><label class="fl">Subject</label><input class="fi" id="emSubj" value="${email.subject.replace(/"/g, "&quot;")}"></div>
        <div><label class="fl">Body</label><textarea id="emBody" style="width:100%;min-height:340px;padding:12px;border:1px solid #d4d4d4;border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;line-height:1.6">${email.body}</textarea></div>
        ${!state.senderName ? `<div style="margin-top:8px;font-size:12px;color:#C8102E">⚠ Set your name in the header so the signature line populates.</div>` : ""}
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="document.getElementById('emailModal').remove()">Cancel</button>
        <button class="btn btn-blue" onclick="copyEmail()">Copy</button>
        <button class="btn btn-red" onclick="sendEmail('${visitId}')">Open in Mail Client</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}
function copyEmail() {
  const subj = document.getElementById("emSubj").value;
  const body = document.getElementById("emBody").value;
  navigator.clipboard.writeText(`Subject: ${subj}\n\n${body}`).then(() => showToast("✓ Email copied to clipboard", "#0A7C3A"));
}
function sendEmail(visitId) {
  const to = document.getElementById("emTo").value;
  const cc = document.getElementById("emCc").value;
  const subj = document.getElementById("emSubj").value;
  const body = document.getElementById("emBody").value;
  const url = `mailto:${encodeURIComponent(to)}?cc=${encodeURIComponent(cc)}&subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
  window.location.href = url;
  markEmailSent(visitId);
  document.getElementById("emailModal").remove();
  showToast("✓ Email opened in mail client (marked sent)", "#0A7C3A");
  render();
}

// ============ HISTORY IMPORT ============
function importHistory() {
  const raw = document.getElementById("historyPaste").value;
  if (!raw.trim()) return;
  try {
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) throw new Error("Expected an array");
    const map = {};
    let imported = 0, skipped = 0;
    parsed.forEach(row => {
      if (!row || typeof row !== "object") { skipped++; return; }
      let agentDealer = null;
      if (row.dealer_num != null) agentDealer = ALL_DEALERS.find(d => d.dealer_num === Number(row.dealer_num));
      if (!agentDealer && row.name) {
        const want = String(row.name).toUpperCase().replace(/[^A-Z0-9]/g, "");
        agentDealer = ALL_DEALERS.find(d => d.name.toUpperCase().replace(/[^A-Z0-9]/g, "") === want);
      }
      if (!agentDealer && row.name) {
        const wantTokens = String(row.name).toUpperCase().split(/\s+/).filter(t => t.length >= 4 && t !== "TOYOTA");
        if (wantTokens.length) {
          agentDealer = ALL_DEALERS.find(d => {
            const dt = d.name.toUpperCase().split(/\s+/);
            return wantTokens.some(t => dt.includes(t));
          });
        }
      }
      if (!agentDealer) { skipped++; return; }
      map[agentDealer.dealer_num] = {
        lastTouchDate: row.lastTouchDate || row.lastVisitDate || null,
        lastTouchType: row.lastTouchType || row.lastVisitType || "Unknown",
        dealerName: agentDealer.name
      };
      imported++;
    });
    state.recentTouches = map;
    state.importMsg = `Imported ${imported} dealers (${skipped} unmatched). Cooldown: ${state.cooldownDays} days.`;
    saveState();
    render();
  } catch (e) {
    state.importMsg = `Import failed: ${e.message}`;
    render();
  }
}
function clearHistory() {
  state.recentTouches = {};
  state.importMsg = "";
  saveState();
  render();
}

// ============ RULES MODAL ============
function showRules() {
  const modal = document.createElement("div");
  modal.className = "modal-bg";
  modal.id = "rulesModal";
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-hdr"><div class="modal-ttl">Scheduling Rules</div><button class="btn btn-ghost btn-sm" onclick="document.getElementById('rulesModal').remove()">✕</button></div>
      <div class="modal-body" style="font-size:13px;line-height:1.7;color:#3A4252">
        <strong>Time slots:</strong> 10:00 AM, 1:00 PM, 3:00 PM (3 visits/day) or 10:00 AM, 1:00 PM (2 visits/day). Friday Houston days end by 2 PM.<br><br>
        <strong>Tier priority:</strong> Tier 1 first, then Tier 2, then Tier 3, then Tier 4. Within tier, sorted by priority score.<br><br>
        <strong>Leaders deprioritized:</strong> Dealers with "LEADERS" or "LEADERS + RT OPP" designation are skipped from auto-planning (they're already performing). You can still schedule them manually from the Directory.<br><br>
        <strong>Out-of-state weeks:</strong> Mon-Wed visits, Thursday is a return travel day, Friday is a Houston metro day.<br><br>
        <strong>In-state road-trip weeks:</strong> Mon-Thu visits (12 dealers max), Friday is Houston metro.<br><br>
        <strong>Friday default:</strong> Houston metro in-person visits if 2+ are available, otherwise Teams calls 10 AM - 12 PM.<br><br>
        <strong>Visit mode:</strong> Auto-set based on designation. Dealers in "Not Participating" or "RT Only" status that are more than 60 miles from Houston default to Teams calls.<br><br>
        <strong>Cooldown:</strong> Dealers with a recent touch (visit, Teams, training, or scheduled follow-up from your dashboard) within the cooldown window (default 90 days) are excluded from auto-planning.
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}


// ============ INIT ============
loadState();
// Hook up sender input
document.getElementById("senderName").value = state.senderName;
document.getElementById("senderName").addEventListener("input", (e) => {
  state.senderName = e.target.value;
  saveState();
});
render();
</script>
</body>
